/* ── Inline Supabase client ── */
function createSB(url,key){
  let sess=null,listeners=[];
  try{const s=JSON.parse(localStorage.getItem('pmtp_s')||'null');if(s&&s.expires_at&&Date.now()/1000<s.expires_at)sess=s;}catch(e){}
  const hdrs=()=>({'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+(sess&&sess.access_token||key)});
  const notify=()=>listeners.forEach(cb=>{try{cb(sess?'SIGNED_IN':'SIGNED_OUT',sess)}catch(e){}});
  const save=s=>{sess=s;s?localStorage.setItem('pmtp_s',JSON.stringify(s)):localStorage.removeItem('pmtp_s');notify();};
  const post=async(path,body)=>{const r=await fetch(url+path,{method:'POST',headers:hdrs(),body:JSON.stringify(body)});return{r,d:await r.json()};};
  const dbReq=async(method,table,filters,body,prefer)=>{
    const q=filters&&filters.length?'?'+filters.join('&'):'';
    const r=await fetch(url+'/rest/v1/'+table+q,{method,headers:{...hdrs(),Prefer:prefer||'return=representation'},body:body?JSON.stringify(body):undefined});
    const t=await r.text();const d=t?JSON.parse(t):null;
    return r.ok?{data:d,error:null}:{data:null,error:d};
  };
  const auth={
    getSession:()=>Promise.resolve({data:{session:sess},error:null}),
    onAuthStateChange:(cb)=>{
      listeners.push(cb);
      setTimeout(()=>cb(sess?'SIGNED_IN':'SIGNED_OUT',sess),0);
      return{data:{subscription:{unsubscribe:()=>{const i=listeners.indexOf(cb);if(i>=0)listeners.splice(i,1);}}}};
    },
    signUp:async({email,password,options={}})=>{
      try{const{r,d}=await post('/auth/v1/signup',{email,password,data:(options.data||{})});
        if(!r.ok)return{data:null,error:{message:d.msg||d.error_description||d.message||'Sign up failed'}};
        if(d.access_token)save(d);
        return{data:{session:d.access_token?sess:null,user:d.user},error:null};
      }catch(e){return{data:null,error:{message:'Connection failed.'}};}
    },
    signInWithPassword:async({email,password})=>{
      try{const{r,d}=await post('/auth/v1/token?grant_type=password',{email,password});
        if(!r.ok)return{data:null,error:{message:d.error_description||d.msg||'Incorrect email or password'}};
        save(d);return{data:{session:sess,user:d.user},error:null};
      }catch(e){return{data:null,error:{message:'Connection failed.'}};}
    },
    signOut:async()=>{try{await fetch(url+'/auth/v1/logout',{method:'POST',headers:hdrs()});}catch(e){}save(null);return{error:null};},
    resetPasswordForEmail:async(email,opts={})=>{
      try{const{r,d}=await post('/auth/v1/recover',{email,redirectTo:opts.redirectTo});
        return r.ok?{error:null}:{error:{message:d.msg||'Reset failed'}};
      }catch(e){return{error:{message:'Connection failed.'}};}
    },
  };
  const from=table=>({
    select:(cols='*')=>{
      let eq=[],ord='';
      const q={
        eq:(c,v)=>{eq.push(c+'=eq.'+encodeURIComponent(v));return q;},
        order:(c,o={})=>{ord='order='+c+'.'+((o.ascending===false)?'desc':'asc');return q;},
        then:(res,rej)=>{const f=['select='+cols,...eq,ord].filter(Boolean);return dbReq('GET',table,f,null,'').then(res,rej);}
      };return q;
    },
    upsert:(body,opts={})=>dbReq('POST',table,[],[].concat(body),'resolution=merge-duplicates,return=representation'),
    update:(body)=>({eq:(c,v)=>dbReq('PATCH',table,[c+'=eq.'+encodeURIComponent(v)],body,'return=representation')}),
    delete:()=>({eq:(c,v)=>dbReq('DELETE',table,[c+'=eq.'+encodeURIComponent(v)],null,'')}),
    insert:(body)=>dbReq('POST',table,[],[].concat(body),'return=representation'),
  });
  return{auth,from};
}

/* ── Helpers ── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtDate=s=>s?new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
const daysTo=s=>{if(!s)return null;const[y,m,d]=s.split('-').map(Number);const today=new Date();const todayMid=new Date(today.getFullYear(),today.getMonth(),today.getDate());const target=new Date(y,m-1,d);return Math.ceil((target-todayMid)/86400000);};
const getDK=mod=>mod.fields.find(f=>f.k==='dueDate')?.k||mod.fields.find(f=>f.k==='travelDate')?.k||mod.fields.find(f=>f.t==='date')?.k;
const isOD=(item,mod)=>{const dk=getDK(mod);return dk&&item[dk]&&daysTo(item[dk])<0;};
const isUG=(item,mod)=>{const dk=getDK(mod);if(!dk||!item[dk])return false;const n=daysTo(item[dk]);const threshold=mod.id==='finalPayments'?7:3;return n!==null&&n>=0&&n<=threshold;};

/* ── Shared small components ── */
function DueBadge({d}){
  if(!d)return null;
  const n=daysTo(d);
  let bg,col,lbl;
  if(n<0){bg=T.redPale;col=T.red;lbl=Math.abs(n)+'d OVERDUE';}
  else if(n===0){bg=T.redPale;col=T.red;lbl='DUE TODAY';}
  else if(n<=3){bg=T.orangePale;col=T.orange;lbl='Due in '+n+'d';}
  else if(n<=7){bg=T.goldPale;col=T.goldDeep;lbl=fmtDate(d);}
  else{bg=T.tealPale;col:'#4a7a7c';lbl=fmtDate(d);}
  return <span style={{background:bg,color:col,fontSize:10,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',padding:'3px 9px',borderRadius:4,whiteSpace:'nowrap'}}>{lbl}</span>;
}

function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,4000);return()=>clearTimeout(t);},[]);
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:type==='ok'?T.green:T.red,color:T.white,padding:'13px 20px',borderRadius:10,boxShadow:'0 8px 32px rgba(0,0,0,0.22)',fontSize:13,maxWidth:360,lineHeight:1.55,display:'flex',alignItems:'flex-start',gap:10,animation:'slideUp 0.22s ease'}}>
    <span style={{fontSize:16,flexShrink:0}}>{type==='ok'?'✓':'⚠'}</span><span>{msg}</span>
  </div>;
}

function AuthScreen({onAuth}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[name,setName]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const[info,setInfo]=useState('');
  const iStyle={width:'100%',padding:'11px 14px',border:'1.5px solid '+T.border,borderRadius:8,fontSize:14,color:T.text,background:T.cream,outline:'none'};
  async function submit(){
    setErr('');setInfo('');setLoading(true);
    if(mode==='login'){
      const{data,error}=await sb.auth.signInWithPassword({email,password});
      if(error)setErr(error.message);else onAuth(data.session);
    }else if(mode==='signup'){
      if(!name.trim()){setErr('Please enter your name.');setLoading(false);return;}
      const{data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:name.trim()}}});
      if(error)setErr(error.message);
      else if(data.session)onAuth(data.session);
      else setInfo('Check your email to confirm your account, then log in.');
    }else{
      const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
      if(error)setErr(error.message);else setInfo('Password reset email sent.');
    }
    setLoading(false);
  }
  return(
    <div style={{minHeight:'100vh',background:T.cream,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:T.white,borderRadius:16,border:'1px solid '+T.border,boxShadow:'0 12px 56px rgba(27,45,58,0.14)',padding:'52px 48px',width:420,textAlign:'center'}}>

/* ── Booking Checklist View ── */
function ChecklistView({session,showToast}){
  const[lists,setLists]=React.useState([]);
  const[showArchived,setShowArchived]=React.useState(false);
  const[adding,setAdding]=React.useState(false);
  const[newClient,setNewClient]=React.useState('');
  const[newTrip,setNewTrip]=React.useState('');
  const[customInputs,setCustomInputs]=React.useState({});
  const[loaded,setLoaded]=React.useState(false);
  const[collapsed,setCollapsed]=React.useState({});
  const toggleCollapse=(id)=>setCollapsed(p=>({...p,[id]:!p[id]}));
  const DEFAULT_STEPS=['Verify you booked the correct hotel, flights, dates, room types, etc. — ALWAYS TRIPLE CHECK YOUR WORK','Create Terms & Conditions for the invoice (if needed)','Create and send invoice via Travel Joy','Check if client needs a visa or other required travel documents','Add trip & commission to my personal commission tracker','Submit sale in Legato','Submit sale in Travel Joy','Save client\'s invoice/reservation in Travel Joy under Files','Add all travelers in Travel Joy including DOB and all info — so you have this next time client books','Create itinerary for client','Create guides for client (if needed)','Create email folder for client and save any emailed reservations','Mark client\'s invoice as paid in Travel Joy','Book extras (excursions, transfers, etc.) if needed','Make a hotel request if needed','Research and book hotel transfers if needed'];
  React.useEffect(()=>{if(!session)return;loadLists();},[session]);
  async function loadLists(){
    const{data,error}=await sb.from('booking_checklists').select('*').order('created_at',{ascending:false});
    if(!error&&data)setLists(data.map(r=>({...r.list_data,id:r.id,archived:r.archived})));
    setLoaded(true);
  }
  async function saveList(list){
    const{id,archived,...list_data}=list;
    await sb.from('booking_checklists').upsert({id,user_id:session.user.id,list_data,archived:archived||false});
  }
  async function createChecklist(){
    if(!newClient.trim())return;
    const steps=DEFAULT_STEPS.map((text,i)=>({id:'s'+i,text,done:false,custom:false}));
    const list={id:uid(),client:newClient.trim(),trip:newTrip.trim(),steps,createdAt:new Date().toISOString(),archived:false};
    setLists(u=>[list,...u]);
    await saveList(list);
    setNewClient('');setNewTrip('');setAdding(false);
    showToast('Checklist created for '+list.client+'.');
  }
  async function toggleStep(listId,stepId){
    const updated=lists.map(l=>l.id!==listId?l:{...l,steps:l.steps.map(s=>s.id===stepId?{...s,done:!s.done}:s)});
    setLists(updated);
    await saveList(updated.find(l=>l.id===listId));
  }
  async function addCustomStep(listId){
    const text=(customInputs[listId]||'').trim();if(!text)return;
    const updated=lists.map(l=>l.id!==listId?l:{...l,steps:[...l.steps,{id:'c'+Date.now(),text,done:false,custom:true}]});
    setLists(updated);setCustomInputs(p=>({...p,[listId]:''}));
    await saveList(updated.find(l=>l.id===listId));showToast('Custom step added.');
  }
  async function archiveList(listId){
    const updated=lists.map(l=>l.id===listId?{...l,archived:!l.archived}:l);
    setLists(updated);const list=updated.find(l=>l.id===listId);
    await saveList(list);showToast(list.archived?'Checklist restored.':'Checklist archived.');
  }
  async function deleteChecklist(listId){
    await sb.from('booking_checklists').delete().eq('id',listId);
    setLists(p=>p.filter(l=>l.id!==listId));showToast('Checklist deleted.');
  }
  async function sendToHPTrip(list,step){
    const entry={id:uid(),done:false,client:list.client,trip:list.trip||'',action:'[Checklist] '+step.text,notes:'From booking checklist — '+list.client+(list.trip?' / '+list.trip:'')};
    await sb.from('dashboard_items').upsert({id:entry.id,user_id:session.user.id,module_id:'hpTrips',item_data:entry,done:false});
    showToast('Sent to High Priority Trip Actions.');
  }
  async function sendToHotelRequest(list){
    const entry={id:uid(),done:false,client:list.client,hotel:'',destination:'',notes:'From booking checklist — '+list.client+(list.trip?' / '+list.trip:''),status:'Pending'};
    await sb.from('dashboard_items').upsert({id:entry.id,user_id:session.user.id,module_id:'hotelRequests',item_data:entry,done:false});
    showToast('Sent to Hotel Requests.');
  }
  async function sendToComponents(list){
    const entry={id:uid(),done:false,client:list.client,trip:list.trip||'',components:'Excursions / transfers / extras needed',notes:'From booking checklist — '+list.client+(list.trip?' / '+list.trip:'')};
    await sb.from('dashboard_items').upsert({id:entry.id,user_id:session.user.id,module_id:'components',item_data:entry,done:false});
    showToast('Sent to Trip Needs Components Added.');
  }
  const active=lists.filter(l=>!l.archived);
  const archived=lists.filter(l=>l.archived);
  const iStyle={width:'100%',padding:'8px 10px',border:'1px solid #ede8df',borderRadius:6,fontSize:13,color:'#1b2d3a',background:'#faf7f2',outline:'none'};

  if(!loaded)return<div style={{padding:'40px',textAlign:'center',color:'#9ab0bb',fontSize:13}}>Loading checklists...</div>;
  return(
    <div style={{padding:'24px 28px',overflowY:'auto',WebkitOverflowScrolling:'touch',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:13}}>
          <div style={{width:4,height:38,background:'linear-gradient(to bottom,#7b68ee,#75afb1)',borderRadius:2}}/>
          <div>
            <div style={{fontSize:10,letterSpacing:'0.16em',color:'#5a7a8a',textTransform:'uppercase',marginBottom:4}}>{active.length} active · {archived.length} archived</div>
            <div style={{fontSize:19,fontWeight:700,color:'#1b2d3a',letterSpacing:'0.04em'}}>📝 Booking Checklists</div>
          </div>
        </div>
        <button onClick={()=>setAdding(v=>!v)} style={{...btn,padding:'9px 20px',fontSize:11,background:'linear-gradient(135deg,#1b2d3a,#243747)',border:'1px solid #c9a84c',color:'#e2c97e'}}>{adding?'Cancel':'+ New Checklist'}</button>
      </div>
      {adding&&<div style={{background:'#ffffff',border:'1px solid #c9a84c',borderRadius:10,padding:'16px 18px',marginBottom:16,boxShadow:'0 2px 12px rgba(27,45,58,0.08)'}}>
        <div style={{fontSize:10,letterSpacing:'0.16em',color:'#5a7a8a',textTransform:'uppercase',marginBottom:12}}>New Checklist</div>
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <div style={{flex:1}}><label style={{display:'block',fontSize:10,letterSpacing:'0.14em',color:'#5a7a8a',textTransform:'uppercase',marginBottom:5}}>Client Name *</label><input value={newClient} onChange={e=>setNewClient(e.target.value)} placeholder="Client name..." style={iStyle}/></div>
          <div style={{flex:1}}><label style={{display:'block',fontSize:10,letterSpacing:'0.14em',color:'#5a7a8a',textTransform:'uppercase',marginBottom:5}}>Trip / Booking #</label><input value={newTrip} onChange={e=>setNewTrip(e.target.value)} placeholder="Trip or booking..." style={iStyle}/></div>
        </div>
        <button onClick={createChecklist} style={{...btn,padding:'9px 20px',fontSize:11,background:'linear-gradient(135deg,#1b2d3a,#243747)',border:'1px solid #c9a84c',color:'#e2c97e'}}>Create Checklist →</button>
      </div>}
      {active.length===0&&!adding&&<div style={{textAlign:'center',padding:'64px 0',color:'#9ab0bb'}}><div style={{fontSize:34,marginBottom:14}}>📝</div><div style={{fontSize:13,letterSpacing:'0.1em'}}>No active checklists — create one for your next booking.</div></div>}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {active.map(list=>{
          const done=list.steps.filter(s=>s.done).length;
          const total=list.steps.length;
          const pct=total?Math.round(done/total*100):0;
          return(
            <div key={list.id} style={{background:'#ffffff',border:'1px solid #ede8df',borderRadius:12,boxShadow:'0 2px 12px rgba(27,45,58,0.06)',overflow:'hidden'}}>
              <div style={{padding:'14px 18px',borderBottom:'1px solid #ede8df',background:'#faf7f2'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
                  <div><div style={{fontWeight:700,fontSize:15,color:'#1b2d3a',marginBottom:3}}>{list.client}</div>{list.trip&&<div style={{fontSize:12,color:'#5a7a8a',background:'#ede8df',padding:'2px 8px',borderRadius:4,display:'inline-block'}}>{list.trip}</div>}</div>
                  <div style={{textAlign:'right'}}><div style={{fontSize:20,fontWeight:700,color:pct===100?'#5a9e82':'#1b2d3a'}}>{done}/{total}</div><div style={{fontSize:11,color:'#9ab0bb'}}>completed</div></div>
                </div>
                <div style={{background:'#ede8df',borderRadius:4,height:5,overflow:'hidden'}}><div style={{background:pct===100?'#5a9e82':'#c9a84c',width:pct+'%',height:'100%',borderRadius:4,transition:'width 0.3s'}}/></div>
                <div style={{fontSize:11,color:'#9ab0bb',marginTop:5}}>{pct}% complete</div>
                <button onClick={()=>toggleCollapse(list.id)} style={{...btn,marginTop:8,padding:'4px 12px',fontSize:10,background:'transparent',border:'1px solid #ede8df',color:'#5a7a8a'}}>{collapsed[list.id]?'▼ Show Steps':'▲ Collapse'}</button>
              </div>

            </div>);

        </div>}
      </div>}
    </div>
  );
}

async function chatReq(method,table,filters,body){
  const q=filters&&filters.length?'?'+filters.join('&'):'';
  const r=await fetch(CHAT_SB_URL+'/rest/v1/'+table+q,{method,headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=representation'},body:body?JSON.stringify(body):undefined});
  const t=await r.text();return t?JSON.parse(t):null;

      const gen=await chatReq('GET','team_chat',['select=*','channel=eq.general','order=created_at.asc','limit=100']);
      if(gen){
        setGeneralMsgs(gen);
        // Mark as read
        const unreadGen=gen.filter(m=>!m.read_by?.includes(agentName));
        if(unreadGen.length>0){
          await Promise.all(unreadGen.map(m=>fetch(CHAT_SB_URL+'/rest/v1/team_chat?id=eq.'+m.id,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({read_by:[...(m.read_by||[]),agentName]})})));
        }
      }
      // Load DMs for all agents to compute unread
      const dms=await chatReq('GET','team_chat',['select=*','channel=eq.dm','order=created_at.asc']);

        const unreadMap={};
        myDms.filter(m=>m.recipient_name===agentName&&!m.read_by?.includes(agentName)).forEach(m=>{
          unreadMap[m.sender_name]=(unreadMap[m.sender_name]||0)+1;

          const conv=myDms.filter(m=>(m.sender_name===agentName&&m.recipient_name===dmAgent)||(m.sender_name===dmAgent&&m.recipient_name===agentName)).slice(-100);

            await Promise.all(unreadDm.map(m=>fetch(CHAT_SB_URL+'/rest/v1/team_chat?id=eq.'+m.id,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({read_by:[...(m.read_by||[]),agentName]})})));

        </div>

    general:{label:'General Request',icon:'📋',desc:'General admin request or question for PMTP leadership'},
    commission_recon:{label:'Commission Reconciliation',icon:'💰',desc:'Submit a commission inquiry — requires 45+ days post-travel'},
    supplier_register:{label:'Register with Supplier',icon:'🏢',desc:'Request to be registered with a PMTP supplier'},
    supplier_add:{label:'Request New Supplier',icon:'➕',desc:'Request PMTP add a new supplier to the roster'},
    niche:{label:'Niche Page Application',icon:'🌟',desc:'Apply to manage a PMTP niche page'},
  };

  async function load(){
    setLoading(true);
    try{
      let url=SB_URL+'/rest/v1/staff_requests?order=created_at.desc';
      if(!isAdmin)url+=`&agent_name=eq.${encodeURIComponent(agentName)}`;
      const r=await fetch(url,{headers:hdrs});
      const d=await r.json();
      setRequests(Array.isArray(d)?d:[]);
    }catch(e){}
    setLoading(false);
  }

  async function loadMessages(reqId){
    try{
      const r=await fetch(SB_URL+`/rest/v1/staff_request_messages?request_id=eq.${reqId}&order=created_at.asc`,{headers:hdrs});
      const d=await r.json();
      setMessages(Array.isArray(d)?d:[]);
    }catch(e){}
  }

  React.useEffect(()=>{load();},[]);

  React.useEffect(()=>{
    if(activeReq){loadMessages(activeReq.id);}
  },[activeReq]);

  async function sendMessage(){
    if(!msgText.trim()||!activeReq)return;
    setSending(true);
    try{
      await fetch(SB_URL+'/rest/v1/staff_request_messages',{method:'POST',headers:{...hdrs,'Prefer':'return=minimal'},body:JSON.stringify({request_id:activeReq.id,author_name:agentName,is_admin:isAdmin,message:msgText.trim()})});
      setMsgText('');
      loadMessages(activeReq.id);
    }catch(e){showToast('Failed to send','err');}
    setSending(false);
  }

  async function updateStatus(reqId,status){
    const body={status};
    if(status==='completed')body.completed_at=new Date().toISOString();
    try{
      await fetch(SB_URL+`/rest/v1/staff_requests?id=eq.${reqId}`,{method:'PATCH',headers:{...hdrs,'Prefer':'return=minimal'},body:JSON.stringify(body)});
      setRequests(prev=>prev.map(r=>r.id===reqId?{...r,...body}:r));
      if(activeReq?.id===reqId)setActiveReq(prev=>({...prev,...body}));
      showToast('Status updated.');
    }catch(e){showToast('Failed to update','err');}
  }
  async function deleteRequest(reqId){
    try{
      await fetch(SB_URL+`/rest/v1/staff_request_messages?request_id=eq.${reqId}`,{method:'DELETE',headers:hdrs});
      await fetch(SB_URL+`/rest/v1/staff_requests?id=eq.${reqId}`,{method:'DELETE',headers:hdrs});
      setRequests(prev=>prev.filter(r=>r.id!==reqId));
      if(activeReq?.id===reqId)setActiveReq(null);
      showToast('Request deleted.');
    }catch(e){showToast('Failed to delete','err');}
  }

  async function submitRequest(){
    setSubmitting(true);
    try{
      await fetch(SB_URL+'/rest/v1/staff_requests',{method:'POST',headers:{...hdrs,'Prefer':'return=minimal'},body:JSON.stringify({agent_name:agentName,agent_email:session?.user?.email||'',request_type:formType,status:'pending',form_data:formData})});
      showToast('Request submitted!');
      setFormType(null);setFormData({});setFormStep(0);
      load();
    }catch(e){showToast('Submission failed','err');}
    setSubmitting(false);
  }

  const T=window.PMTP_T||{};
  const navy='#1b2d3a',teal='#2e8b8b',gold='#c9a84c',cream='#faf7f2',border='#e8e3db',textSec='#5a7a8a',red='#c0392b',green='#27ae60',orange='#d4843e',white='#ffffff';
  const btn={border:'none',borderRadius:6,cursor:'pointer',fontFamily:"'Georgia',serif",letterSpacing:'0.06em',textTransform:'uppercase'};
  const inp={width:'100%',padding:'9px 12px',border:'1.5px solid '+border,borderRadius:8,fontSize:13,color:navy,background:white,outline:'none',fontFamily:"'Georgia',serif",boxSizing:'border-box'};
  const statusColor={pending:orange,in_review:teal,approved:green,denied:red,completed:'#888'};
  const statusLabel={pending:'Pending',in_review:'In Review',approved:'Approved',denied:'Denied',completed:'Completed'};

  function fmtDate(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

  // Form renderer
  if(formType==='niche'&&!nicheAck){
    return(<div style={{padding:'24px 28px',overflowY:'auto',WebkitOverflowScrolling:'touch',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>{setFormType(null);setNicheAckChecked(false);}} style={{...btn,padding:'6px 14px',fontSize:10,background:'transparent',border:'1px solid '+border,color:textSec}}>← Back</button>
        <div style={{fontSize:11,color:textSec,letterSpacing:'0.1em',textTransform:'uppercase'}}>🌟 Niche Page Application</div>
      </div>
      <div style={{background:white,border:'1px solid '+border,borderRadius:10,padding:'24px',marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700,color:navy,marginBottom:8}}>Before You Apply</div>
        <div style={{fontSize:13,color:textSec,lineHeight:1.7,marginBottom:20}}>Niche page manager roles are awarded based on expertise, availability, professionalism, and PMTP's business needs. Assignments are not guaranteed. Please read the full program guidelines before submitting your application — applications that do not reflect the guidelines will not be considered.</div>
        <a href='https://niche-guidelines.vercel.app/' target='_blank' style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 20px',background:`linear-gradient(135deg,${navy},#2a3f50)`,border:'1px solid '+gold,borderRadius:6,color:gold,fontSize:11,fontFamily:"'Georgia',serif",letterSpacing:'0.08em',textTransform:'uppercase',textDecoration:'none',marginBottom:24}}>📖 Read the Program Guidelines ↗</a>
        <div style={{borderTop:'1px solid '+border,paddingTop:20}}>
          <label style={{display:'flex',alignItems:'flex-start',gap:12,cursor:'pointer'}}>
            <input type='checkbox' checked={nicheAckChecked} onChange={e=>setNicheAckChecked(e.target.checked)} style={{marginTop:3,flexShrink:0,width:16,height:16,cursor:'pointer'}}/>
            <span style={{fontSize:13,color:navy,lineHeight:1.6}}>I have read and understood the PMTP Niche Page Manager Program guidelines. I understand that niche assignments are not guaranteed and that all niche page assets remain the property of Point Me to Paradise Travel.</span>
          </label>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <button onClick={()=>setNicheAck(true)} disabled={!nicheAckChecked} style={{...btn,padding:'11px 28px',fontSize:11,background:nicheAckChecked?`linear-gradient(135deg,${navy},#2a3f50)`:'transparent',border:'1px solid '+(nicheAckChecked?gold:border),color:nicheAckChecked?gold:textSec,opacity:nicheAckChecked?1:0.5,cursor:nicheAckChecked?'pointer':'not-allowed'}}>Start Application →</button>
      </div>
    </div>);
  }
  if(formType&&formType!=='_choose'){
    const fd=formData;
    const set=(k,v)=>setFormData(p=>({...p,[k]:v}));
    const field=(label,k,type='text',opts=null,req=false,hint='')=>(<div style={{marginBottom:14}}>
      <div style={{fontSize:11,letterSpacing:'0.1em',color:textSec,textTransform:'uppercase',marginBottom:5,fontWeight:700}}>{label}{req&&<span style={{color:red}}> *</span>}</div>
      {hint&&<div style={{fontSize:11,color:textSec,fontStyle:'italic',marginBottom:5}}>{hint}</div>}
      {type==='text'&&<input value={fd[k]||''} onChange={e=>set(k,e.target.value)} style={inp}/>}
      {type==='area'&&<textarea value={fd[k]||''} onChange={e=>set(k,e.target.value)} style={{...inp,height:90,resize:'vertical'}}/>}
      {type==='select'&&opts&&<select value={fd[k]||''} onChange={e=>set(k,e.target.value)} style={{...inp,height:38}}><option value=''>Select...</option>{opts.map(o=><option key={o} value={o}>{o}</option>)}</select>}
      {type==='multicheck'&&opts&&<div style={{display:'flex',flexDirection:'column',gap:6,marginTop:4}}>{opts.map(o=><label key={o} style={{display:'flex',alignItems:'flex-start',gap:8,fontSize:13,color:navy,cursor:'pointer'}}><input type='checkbox' checked={(fd[k]||[]).includes(o)} onChange={e=>{const cur=fd[k]||[];set(k,e.target.checked?[...cur,o]:cur.filter(x=>x!==o));}} style={{marginTop:2,flexShrink:0}}/>{o}</label>)}</div>}
    </div>);

    let steps=[];
    if(formType==='general'){
      steps=[[
        field('Your Request','request',  'area',null,true,'Describe what you need from admin.')
      ]];
    } else if(formType==='supplier_register'){
      steps=[[
        field('Supplier Name','supplier','text',null,true,'Which PMTP supplier would you like to be registered with?'),
        field('Consortia Association','consortia','text',null,true,'Which consortia, if any, is associated with this supplier? Check the Supplier Showcase. If none, type NA.'),
      ]];
    } else if(formType==='supplier_add'){
      steps=[[
        field('Supplier Requested','supplier','text',null,true),
        field('Why are you requesting this supplier?','reason','area',null,true),
        field('How soon do you need this supplier added, and why?','urgency','area',null,true),
        field('Do you have personal experience with this supplier?','experience','text',null,true),
      ]];
    } else if(formType==='commission_recon'){
      steps=[[
        field('Has it been at least 45 days since the client traveled?','days_45','select',['Yes — it has been at least 45 days','No — it has not yet been 45 days'],true),
        field('Is this booking part of a group?','is_group','select',['Yes','No'],true),
      ],[
        field('Lead Guest — First and Last Name as Listed on the Reservation','lead_guest','text',null,true),
        field('Supplier Used','supplier','text',null,true),
        field('Travel Start Date','travel_start','text',null,true),
        field('Travel End Date','travel_end','text',null,true),
        field('Total Trip Cost','trip_cost','text',null,true),
        field('Total Commission Expected','commission_expected','text',null,true),
        field('Agent Copy / Reservation Document','doc_link','text',null,true,'Paste a Google Drive link to your agent copy of the reservation. If no agent copy, attach what you have.'),
      ]];
    } else if(formType==='niche'){
      steps=[
        [
          field('Full Name','full_name','text',null,true),
          field('Best Phone Number','phone','text',null,true),
          field('Which niche are you applying to manage?','niche','select',NICHES,true),
          field('If you selected "Other," please specify','niche_other','text'),
        ],
        [
          field('Why are you a strong fit for this niche?','fit_reason','area',null,true,'Be specific — what you know, firsthand experience, and why you\'re the right person.'),
          field('What real booking experience do you have in this niche?','booking_experience','area',null,true,'Number of bookings, client types, suppliers used, timeframe.'),
          field('Relevant trainings, certifications, or supplier relationships','certifications','area',null,true,'Destination certs, FAM trips, supplier training, site inspections.'),
        ],
        [
          field('Are you willing to accept PMTP-generated leads in this niche?','accept_leads','select',['Yes — I understand these leads follow the standard PMTP commission structure','No — I am not able to accept inbound leads at this time'],true),
          field('Typical response time when a new lead comes in','response_time','select',['Within 1 hour','Within 2–3 hours','Within the same business day','Within 24 hours','It depends / varies significantly'],true),
          field('General availability','availability','multicheck',['Monday through Friday, standard business hours','Evenings on weekdays','Weekends','I have limited or unpredictable availability','I am available full-time as a travel agent'],true),
          field('Hours per week you can realistically dedicate to this niche page','hours_per_week','text',null,true),
        ],
        [
          field('How would you help grow this niche page?','growth_plan','area',null,true,'Beyond answering leads — how will you build credibility and audience?'),
          field('Content you can contribute monthly','content_types','multicheck',['Written destination tips or travel guides','Short-form video or Reels','Social media posts or stories','Client testimonials or trip recaps','Photography from personal or client travel','Supplier spotlights or product comparisons','Email newsletter content','I am not currently able to contribute content'],true),
          field('Comfort being a visible face of this niche','visibility','select',['Very comfortable — I\'m happy to be front-facing','Somewhat comfortable — I can do it when needed','Not comfortable — I prefer to stay behind the scenes'],true),
        ],
        [
          field('If lead volume grows, are you open to a team model?','team_model','select',['Yes — I understand the program may evolve and I\'m open to that','No — I would prefer to remain the sole agent for this niche','I need more information before I can answer this'],true),
          field('Do you understand that the niche page, branding, and all assets remain the property of PMTP?','ownership_ack','select',['Yes — I have read the guidelines and I understand this fully','No — I have questions about this before I can agree'],true),
          field('Why should PMTP trust you to represent this niche?','closing_statement','area',null,true,'Your closing statement. Be honest, specific, and direct.'),
          field('Anything else you want PMTP leadership to know?','additional','area',null,false),
        ],
      ];
    }

    const currentStep=steps[formStep]||[];
    const totalSteps=steps.length;
    const canNext=formType!=='niche'||true;

    return(<div style={{padding:'24px 28px',overflowY:'auto',WebkitOverflowScrolling:'touch',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>{setFormType(null);setFormData({});setFormStep(0);setNicheAck(false);setNicheAckChecked(false);}} style={{...btn,padding:'6px 14px',fontSize:10,background:'transparent',border:'1px solid '+border,color:textSec}}>← Back</button>
        <div>
          <div style={{fontSize:11,color:textSec,letterSpacing:'0.1em',textTransform:'uppercase'}}>{FORMS[formType]?.icon} {FORMS[formType]?.label}</div>
          {totalSteps>1&&<div style={{fontSize:11,color:textSec}}>Step {formStep+1} of {totalSteps}</div>}
        </div>
      </div>
      {totalSteps>1&&<div style={{display:'flex',gap:4,marginBottom:20}}>{steps.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=formStep?teal:border}}/>)}</div>}
      <div style={{background:white,border:'1px solid '+border,borderRadius:10,padding:'20px 24px',marginBottom:16}}>
        {currentStep}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        {formStep>0&&<button onClick={()=>setFormStep(s=>s-1)} style={{...btn,padding:'10px 20px',fontSize:11,background:'transparent',border:'1px solid '+border,color:textSec}}>← Previous</button>}
        {formStep<totalSteps-1
          ?<button onClick={()=>setFormStep(s=>s+1)} style={{...btn,padding:'10px 20px',fontSize:11,background:teal,color:white}}>Next →</button>
          :<button onClick={submitRequest} disabled={submitting} style={{...btn,padding:'10px 24px',fontSize:11,background:`linear-gradient(135deg,${navy},#2a3f50)`,border:'1px solid '+gold,color:gold,opacity:submitting?0.7:1}}>{submitting?'Submitting...':'Submit Request'}</button>
        }
      </div>
    </div>);
  }

  // Detail view
  if(activeReq){
    const formD=activeReq.form_data||{};
    const fields=Object.entries(formD).filter(([k])=>k!=='agent_name');
    const labelMap={request:'Request',supplier:'Supplier',consortia:'Consortia',reason:'Reason',urgency:'Urgency',experience:'Experience',full_name:'Full Name',phone:'Phone',niche:'Niche',niche_other:'Niche (Other)',fit_reason:'Fit Reason',booking_experience:'Booking Experience',certifications:'Certifications',accept_leads:'Accept Leads',response_time:'Response Time',availability:'Availability',hours_per_week:'Hours/Week',growth_plan:'Growth Plan',content_types:'Content Types',visibility:'Visibility Comfort',team_model:'Team Model',ownership_ack:'Ownership Acknowledgment',closing_statement:'Closing Statement',additional:'Additional Notes',days_45:'45 Days Since Travel?',is_group:'Group Booking?',lead_guest:'Lead Guest Name',travel_start:'Travel Start Date',travel_end:'Travel End Date',trip_cost:'Total Trip Cost',commission_expected:'Commission Expected',doc_link:'Agent Copy / Document Link'};
    return(<div style={{padding:'24px 28px',overflowY:'auto',WebkitOverflowScrolling:'touch',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <button onClick={()=>setActiveReq(null)} style={{...btn,padding:'6px 14px',fontSize:10,background:'transparent',border:'1px solid '+border,color:textSec}}>← Back</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15,color:navy}}>{FORMS[activeReq.request_type]?.icon} {FORMS[activeReq.request_type]?.label}</div>
          <div style={{fontSize:12,color:textSec}}>{activeReq.agent_name} · {fmtDate(activeReq.created_at)}</div>
        </div>
        <span style={{fontSize:11,fontWeight:700,color:statusColor[activeReq.status]||textSec,background:(statusColor[activeReq.status]||textSec)+'22',padding:'4px 10px',borderRadius:20,border:'1px solid '+(statusColor[activeReq.status]||border)}}>{statusLabel[activeReq.status]||activeReq.status}</span>
      </div>
      {isAdmin&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
        {['pending','in_review','approved','denied','completed'].map(s=>(
          <button key={s} onClick={()=>updateStatus(activeReq.id,s)} style={{...btn,padding:'5px 12px',fontSize:10,background:activeReq.status===s?statusColor[s]:'transparent',color:activeReq.status===s?white:statusColor[s]||textSec,border:'1px solid '+(statusColor[s]||border)}}>{statusLabel[s]}</button>
        ))}
        <button onClick={()=>{if(window.confirm('Delete this request permanently?'))deleteRequest(activeReq.id);}} style={{...btn,padding:'5px 12px',fontSize:10,background:'transparent',border:'1px solid #fcc',color:red,marginLeft:'auto'}}>✕ Delete</button>
      </div>}
      {activeReq.completed_at&&<div style={{fontSize:11,color:textSec,marginBottom:12}}>Completed: {fmtDate(activeReq.completed_at)}</div>}
      <div style={{background:white,border:'1px solid '+border,borderRadius:10,padding:'16px 20px',marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:teal,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:12}}>Submission Details</div>
        {fields.map(([k,v])=>v&&(<div key={k} style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid '+border}}>
          <div style={{fontSize:10,letterSpacing:'0.1em',color:textSec,textTransform:'uppercase',marginBottom:3}}>{labelMap[k]||k}</div>
          <div style={{fontSize:13,color:navy,lineHeight:1.5}}>{Array.isArray(v)?v.join(', '):v}</div>
        </div>))}
      </div>
      <div style={{background:white,border:'1px solid '+border,borderRadius:10,padding:'16px 20px',marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:teal,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:12}}>Messages</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12,maxHeight:280,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
          {messages.length===0&&<div style={{fontSize:12,color:textSec,fontStyle:'italic'}}>No messages yet.</div>}
          {messages.map(m=>(<div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:m.author_name===agentName?'flex-end':'flex-start'}}>
            <div style={{background:m.is_admin?navy:teal+'22',color:m.is_admin?white:navy,borderRadius:8,padding:'8px 12px',maxWidth:'85%',fontSize:13,lineHeight:1.4}}>
              <div style={{fontSize:10,opacity:0.7,marginBottom:3}}>{m.author_name}{m.is_admin?' (Admin)':''}</div>
              {m.message}
            </div>
            <div style={{fontSize:10,color:textSec,marginTop:2}}>{fmtDate(m.created_at)}</div>
          </div>))}
        </div>
        <div style={{display:'flex',gap:8}}>
          <input value={msgText} onChange={e=>setMsgText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}} placeholder='Type a message...' style={{...inp,flex:1}}/>
          <button onClick={sendMessage} disabled={sending||!msgText.trim()} style={{...btn,padding:'9px 16px',fontSize:11,background:teal,color:white,opacity:sending?0.7:1,flexShrink:0}}>Send</button>
        </div>
      </div>
    </div>);
  }

  // Main list view
  const filtered=requests.filter(r=>filterStatus==='all'||r.status===filterStatus);
  return(<div style={{padding:'24px 28px',overflowY:'auto',WebkitOverflowScrolling:'touch',height:'100%'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:13}}>
        <div style={{width:4,height:38,background:`linear-gradient(to bottom,${gold},${teal})`,borderRadius:2}}/>
        <div>
          <div style={{fontSize:10,letterSpacing:'0.16em',color:textSec,textTransform:'uppercase',marginBottom:4}}>{isAdmin?'All Agent Admin Requests':'My Agent Admin Requests'}</div>
          <div style={{fontSize:19,fontWeight:700,color:navy}}>📬 Agent Admin Requests</div>
        </div>
      </div>
      <button onClick={()=>{setFormType(null);setFormData({});setFormStep(0);setNicheAck(false);setNicheAckChecked(false);setFormType('_choose');}} style={{...btn,padding:'9px 20px',fontSize:11,background:`linear-gradient(135deg,${navy},#2a3f50)`,border:'1px solid '+gold,color:gold}}>+ New Request</button>
    </div>
    {formType==='_choose'&&(<div style={{background:white,border:'1px solid '+border,borderRadius:10,padding:'20px',marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:700,color:navy,marginBottom:14}}>What type of request?</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {Object.entries(FORMS).map(([k,f])=>(<button key={k} onClick={()=>{setFormType(k);setFormStep(0);}} style={{...btn,padding:'12px 16px',fontSize:12,background:cream,border:'1px solid '+border,color:navy,textAlign:'left',textTransform:'none',letterSpacing:0,borderRadius:8,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18}}>{f.icon}</span>
          <div><div style={{fontWeight:700,fontSize:13}}>{f.label}</div><div style={{fontSize:11,color:textSec,fontWeight:400}}>{f.desc}</div></div>
        </button>))}
      </div>
      <button onClick={()=>setFormType(null)} style={{...btn,marginTop:12,padding:'6px 14px',fontSize:10,background:'transparent',border:'1px solid '+border,color:textSec}}>Cancel</button>
    </div>)}
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
      {['all','pending','in_review','approved','denied','completed'].map(s=><button key={s} onClick={()=>setFilterStatus(s)} style={{...btn,padding:'5px 12px',fontSize:10,background:filterStatus===s?(s==='all'?navy:statusColor[s]||navy):'transparent',color:filterStatus===s?white:s==='all'?textSec:statusColor[s]||textSec,border:'1px solid '+(s==='all'?border:statusColor[s]||border),textTransform:'none',letterSpacing:0}}>{s==='all'?'All':statusLabel[s]}</button>)}
    </div>
    {loading&&<div style={{textAlign:'center',padding:'40px 0',color:textSec}}>Loading...</div>}
    {!loading&&filtered.length===0&&<div style={{textAlign:'center',padding:'64px 0',color:textSec}}><div style={{fontSize:34,marginBottom:14}}>📬</div><div style={{fontSize:13,letterSpacing:'0.1em'}}>{requests.length===0?'No requests yet.':'No requests match this filter.'}</div></div>}
    <div style={{display:'flex',flexDirection:'column',gap:8}}>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:4}}>

            {isAdmin&&<span style={{fontSize:11,color:textSec,background:cream,padding:'2px 8px',borderRadius:4,border:'1px solid '+border}}>{r.agent_name}</span>}
          </div>
          <div style={{fontSize:11,color:textSec}}>{fmtDate(r.created_at)}{r.completed_at?' · Completed '+fmtDate(r.completed_at):''}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          <span style={{fontSize:11,fontWeight:700,color:statusColor[r.status]||textSec,background:(statusColor[r.status]||textSec)+'22',padding:'4px 10px',borderRadius:20,border:'1px solid '+(statusColor[r.status]||border)}}>{statusLabel[r.status]||r.status}</span>
          {isAdmin&&<button onClick={e=>{e.stopPropagation();if(window.confirm('Delete this request?'))deleteRequest(r.id);}} style={{...btn,padding:'4px 8px',fontSize:10,background:'transparent',border:'1px solid #fcc',color:red}}>✕</button>}
        </div>
      </div>))}
    </div>
  </div>);
}

function AdminCoWorkView({session,showToast,agentName}){
  const ADMINS=['Christina Garcia','Tabitha Garcia'];

  async function updateStatus(id,status){

    }catch(e){showToast('Could not update','err');}
  }

  async function saveEdit(id){
    try{
      await fetch(SB_URL+`/rest/v1/admin_collab_tasks?id=eq.${id}`,{method:'PATCH',headers:{...hdrs,'Prefer':'return=minimal'},body:JSON.stringify({...editForm,updated_at:new Date().toISOString()})});

    }catch(e){showToast('Could not update','err');}

  async function deleteTask(id){

      <div style={{display:'flex',alignItems:'center',gap:13}}>

        </div>

    </div>

    {showAdd&&<div style={{background:white,border:'1px solid '+purple,borderRadius:10,padding:'18px 20px',marginBottom:18}}>

        <div><label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:textSec,textTransform:'uppercase',marginBottom:4}}>Assign To</label><select value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} style={{...inp,height:38}}>{ADMINS.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
        <div><label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:textSec,textTransform:'uppercase',marginBottom:4}}>Priority</label><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={{...inp,height:38}}><option>High</option><option>Medium</option><option>Low</option></select></div>
        <div><label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:textSec,textTransform:'uppercase',marginBottom:4}}>Due Date</label><input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))} style={inp}/></div>
      </div>
      <div style={{marginBottom:12}}><label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:textSec,textTransform:'uppercase',marginBottom:4}}>Notes</label><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} style={{...inp,resize:'vertical'}} placeholder="Additional details..."/></div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
        <button onClick={()=>setShowAdd(false)} style={{...btn,padding:'8px 16px',fontSize:11,background:'transparent',border:'1px solid '+border,color:textSec}}>Cancel</button>
        <button onClick={addTask} style={{...btn,padding:'8px 20px',fontSize:11,background:`linear-gradient(135deg,${navy},#2a3f50)`,border:'1px solid '+gold,color:gold}}>Create Task</button>
      </div>
    </div>}

    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
      {[['all','All'],['mine','Assigned to Me'],['theirs','Assigned to Them'],['open','Open'],['done','Done']].map(([f,l])=>(
        <button key={f} onClick={()=>setFilter(f)} style={{...btn,padding:'5px 12px',fontSize:10,background:filter===f?purple:'transparent',color:filter===f?white:textSec,border:'1px solid '+(filter===f?purple:border),textTransform:'none',letterSpacing:0}}>{l}</button>
      ))}
    </div>

    {loading&&<div style={{textAlign:'center',padding:'40px 0',color:textSec}}>Loading...</div>}
    {!loading&&filtered.length===0&&<div style={{textAlign:'center',padding:'64px 0',color:textSec}}><div style={{fontSize:32,marginBottom:12}}>🔐</div><div style={{fontSize:13}}>No tasks here.</div></div>}

    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtered.map(t=>{
        const od=isOverdue(t);
        const isAssignedToMe=t.assigned_to===agentName;
        return(<div key={t.id} style={{background:white,border:'1px solid '+(od&&t.status!=='done'?red:t.status==='done'?border:purple+'44'),borderRadius:10,padding:'12px 16px',boxShadow:'0 2px 8px rgba(27,45,58,0.05)'}}>
          {editId===t.id?(<div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:8,marginBottom:8}}>
              <div style={{gridColumn:'1/-1'}}><input value={editForm.title||''} onChange={e=>setEditForm(f=>({...f,title:e.target.value}))} style={inp}/></div>
              <div><select value={editForm.assigned_to||''} onChange={e=>setEditForm(f=>({...f,assigned_to:e.target.value}))} style={{...inp,height:38}}>{ADMINS.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
              <div><select value={editForm.priority||'Medium'} onChange={e=>setEditForm(f=>({...f,priority:e.target.value}))} style={{...inp,height:38}}><option>High</option><option>Medium</option><option>Low</option></select></div>
              <div><input type="date" value={editForm.due_date||''} onChange={e=>setEditForm(f=>({...f,due_date:e.target.value}))} style={inp}/></div>
            </div>
            <div style={{marginBottom:8}}><textarea value={editForm.notes||''} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} rows={2} style={{...inp,resize:'vertical'}}/></div>
            <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>

function VaultView({session,sb,showToast}){
  const[entries,setEntries]=React.useState([]);
  const[loaded,setLoaded]=React.useState(false);
  const[pinUnlocked,setPinUnlocked]=React.useState(false);
  const[pinInput,setPinInput]=React.useState('');
  const[pinSet,setPinSet]=React.useState(false);
  const[pinError,setPinError]=React.useState('');
  const VAULT_PIN_KEY='pmtp_vault_pin_'+session?.user?.id;
  const[showAdd,setShowAdd]=React.useState(false);
  const[editId,setEditId]=React.useState(null);
  const[search,setSearch]=React.useState('');
  const[filterAgency,setFilterAgency]=React.useState('');
  const[showPw,setShowPw]=React.useState({});
  const[form,setForm]=React.useState({vendor:'',website:'',agency:'',email:'',credentials:'',phone:'',username:'',password:'',notes:''});
  const uid=session.user.id;
  const AGENCIES=['PMTP','Legato','TPI'];
  const T2={navy:'#1b2d3a',navyMid:'#243747',gold:'#c9a84c',goldLight:'#e2c97e',teal:'#2e8b8b',tealPale:'#e8f5f5',cream:'#faf7f2',white:'#ffffff',border:'#ede8df',textSec:'#5a7a8a',textSub:'#9ab0bb',green:'#5a9e82',red:'#c0392b',redPale:'#fdecea',purple:'#5a4a8a',purplePale:'#ede9f8'};
  const btn2={fontFamily:"'Georgia',serif",cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:700,borderRadius:6,border:'none',fontSize:11};
  const inp={width:'100%',padding:'8px 11px',border:'1px solid '+T2.border,borderRadius:6,fontSize:12,color:T2.navy,background:T2.cream,outline:'none'};

  React.useEffect(()=>{if(session)load();},[session]);
  React.useEffect(()=>{
    const stored=localStorage.getItem(VAULT_PIN_KEY);
    setPinSet(!!stored);
  },[]);

  function checkPin(){
    const stored=localStorage.getItem(VAULT_PIN_KEY);
    if(!stored){
      if(pinInput.length<4){setPinError('PIN must be at least 4 digits');return;}
      localStorage.setItem(VAULT_PIN_KEY,pinInput);
      setPinUnlocked(true);setPinError('');showToast('PIN set! Vault unlocked.');
    } else {
      if(pinInput===stored){setPinUnlocked(true);setPinError('');setPinInput('');}
      else{setPinError('Incorrect PIN');setPinInput('');}
    }
  }
  function resetPin(){
    if(!window.confirm('Reset your vault PIN? You will need to set a new one.'))return;
    localStorage.removeItem(VAULT_PIN_KEY);setPinSet(false);setPinUnlocked(false);setPinInput('');
  }

  async function load(){
    const{data,error}=await sb.from('password_vault').select('*').eq('user_id',uid).order('vendor',{ascending:true});
    if(!error&&data)setEntries(data);
    setLoaded(true);
  }

  function resetForm(){setForm({vendor:'',website:'',agency:'',email:'',credentials:'',phone:'',username:'',password:'',notes:''});setEditId(null);setShowAdd(false);}

  async function save(){
    if(!form.vendor.trim()){showToast('Vendor name is required','err');return;}
    if(editId){
      const{error}=await sb.from('password_vault').update({...form}).eq('id',editId).eq('user_id',uid);
      if(error){showToast('Could not save','err');return;}
      setEntries(p=>p.map(e=>e.id===editId?{...e,...form}:e));
      showToast('Entry updated!');
    } else {
      const{data,error}=await sb.from('password_vault').insert([{...form,user_id:uid}]);
      if(error){showToast('Could not save','err');return;}
      load();showToast('Entry saved!');
    }
    resetForm();
  }

  async function del(id){
    if(!window.confirm('Delete this vault entry? This cannot be undone.'))return;
    await sb.from('password_vault').delete().eq('id',id).eq('user_id',uid);
    setEntries(p=>p.filter(e=>e.id!==id));
    showToast('Entry removed.');
  }

  function edit(e){
    setForm({vendor:e.vendor||'',website:e.website||'',agency:e.agency||'',email:e.email||'',credentials:e.credentials||'',phone:e.phone||'',username:e.username||'',password:e.password||'',notes:e.notes||''});
    setEditId(e.id);setShowAdd(true);
  }

  const filtered=entries.filter(e=>{
    const q=search.toLowerCase();
    const matchSearch=!q||[e.vendor,e.website,e.email,e.username,e.notes,e.agency].some(v=>v&&v.toLowerCase().includes(q));
    const matchAgency=!filterAgency||e.agency===filterAgency;
    return matchSearch&&matchAgency;
  });

  const agencyColors={'PMTP':{bg:'#e8f5f5',color:T2.teal},'Legato':{bg:'#f0ecf8',color:T2.purple},'TPI':{bg:T2.redPale,color:T2.red}};

  if(!pinUnlocked)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 20px',maxWidth:360,margin:'0 auto'}}>
      <div style={{fontSize:32,marginBottom:16}}>🔐</div>
      <div style={{fontSize:18,fontWeight:700,color:'#1b2d3a',fontFamily:"'Georgia',serif",marginBottom:8}}>{pinSet?'Enter Your PIN':'Set Your Vault PIN'}</div>
      <div style={{fontSize:13,color:'#5a7a8a',marginBottom:24,textAlign:'center'}}>{pinSet?'Enter your PIN to access the Password Vault.':'Choose a PIN to protect your Password Vault. You will need this every time you open it.'}</div>
      <input type="password" inputMode="numeric" maxLength={8} value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,''))} onKeyDown={e=>e.key==='Enter'&&checkPin()} placeholder={pinSet?'Enter PIN...':'Choose a PIN...'} style={{width:'100%',padding:'14px',fontSize:22,textAlign:'center',border:'2px solid #2e8b8b',borderRadius:10,fontFamily:'monospace',letterSpacing:'0.3em',marginBottom:10,background:'#faf7f2',outline:'none'}}/>
      {pinError&&<div style={{fontSize:12,color:'#c0392b',marginBottom:10}}>{pinError}</div>}
      <button onClick={checkPin} style={{width:'100%',padding:'12px',background:'linear-gradient(135deg,#1b2d3a,#243747)',border:'1px solid #c9a84c',color:'#e2c97e',fontFamily:"'Georgia',serif",fontSize:13,textTransform:'uppercase',letterSpacing:'0.1em',borderRadius:8,cursor:'pointer',marginBottom:pinSet?10:0}}>{pinSet?'Unlock Vault':'Set PIN & Enter'}</button>
      {pinSet&&<button onClick={resetPin} style={{background:'transparent',border:'none',color:'#9ab0bb',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Forgot PIN? Reset</button>}
    </div>
  );
  if(!loaded)return <div style={{padding:'40px',textAlign:'center',color:T2.textSub,fontSize:13}}>Loading vault...</div>;

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',WebkitOverflowScrolling:'touch',height:'100%'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:13}}>
          <div style={{width:4,height:38,background:'linear-gradient(to bottom,#5a4a8a,'+T2.teal+')',borderRadius:2}}/>
          <div>
            <div style={{fontSize:10,letterSpacing:'0.16em',color:T2.textSec,textTransform:'uppercase',marginBottom:4}}>{entries.length} saved credentials</div>
            <div style={{fontSize:19,fontWeight:700,color:T2.navy,letterSpacing:'0.04em'}}>🔐 Password Vault</div>

/* ── Agent Search Dropdown ── */
function AgentSearch({agents,selected,onSelect,placeholder}){
  const[query,setQuery]=React.useState('');
  const[open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',handler);return()=>document.removeEventListener('mousedown',handler);
  },[]);
  const filtered=agents.filter(a=>!selected.includes(a)&&a.toLowerCase().includes(query.toLowerCase()));
  return(
    <div ref={ref} style={{position:'relative',maxWidth:320}}>
      <input value={query} onChange={e=>{setQuery(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} placeholder={placeholder||'Search agents...'} style={{width:'100%',padding:'9px 12px',border:'1px solid '+T.teal,borderRadius:6,fontSize:13,color:'#1b2d3a',background:'#faf7f2',outline:'none'}}/>

/* ── Agent Co-Work Requests View ── */
function AgentRequestsView({session,showToast,onCreateTrip}){
  const agentName=session?.user?.user_metadata?.full_name||session?.user?.email||'';
  const[tab,setTab]=React.useState('inbox');
  const[allAgents,setAllAgents]=React.useState([]);
  const[inbox,setInbox]=React.useState([]);
  const[sent,setSent]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[showForm,setShowForm]=React.useState(false);
  const[form,setForm]=React.useState({requesting_agent:agentName,accepting_agent:'',client:'',trip:'',request_type:'Co-Work Trip',details:'',due_date:'',commission:'',notes:''});
  const T=window.PMTP_T||{};
  const btn={fontFamily:"'Georgia',serif",cursor:'pointer',borderRadius:7,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',fontSize:11,border:'none'};

  React.useEffect(()=>{load();loadAgents();},[]);
  async function loadAgents(){
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/agent_presence?select=agent_name&order=agent_name.asc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const data=await r.json();
      if(Array.isArray(data))setAllAgents(data.map(a=>a.agent_name).filter(a=>a&&a!==agentName));
    }catch(e){}
  }

  async function load(){
    setLoading(true);
    try{
      const[ir,sr]=await Promise.all([
        fetch(CHAT_SB_URL+'/rest/v1/agent_requests?accepting_agent=eq.'+encodeURIComponent(agentName)+'&order=created_at.desc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}}),
        fetch(CHAT_SB_URL+'/rest/v1/agent_requests?requesting_agent=eq.'+encodeURIComponent(agentName)+'&order=created_at.desc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}})
      ]);
      const[idata,sdata]=await Promise.all([ir.json(),sr.json()]);
      if(Array.isArray(idata))setInbox(idata);
      if(Array.isArray(sdata))setSent(sdata);
    }catch(e){}
    setLoading(false);
  }

  async function submitRequest(){
    if(!form.accepting_agent||!form.client||!form.details){showToast('Please fill in required fields','err');return;}
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/agent_requests',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({...form,status:'pending',created_at:new Date().toISOString()})});
      if(!r.ok){showToast('Could not send request','err');return;}
      showToast('Request sent!');setShowForm(false);setForm({requesting_agent:agentName,accepting_agent:'',client:'',trip:'',request_type:'Co-Work Trip',details:'',due_date:'',commission:'',notes:''});load();setTab('sent');
    }catch(e){showToast('Could not send request','err');}
  }

  async function cancelRequest(id){
    if(!window.confirm('Cancel this request? The record will be deleted.'))return;
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/agent_requests?id=eq.'+id,{method:'DELETE',headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});

    <div class="footer">Point Me to Paradise Travel · FIT Trip Record · Confidential</div>

    const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);

  // Calculations
  const totalPaid=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

        </div>
      </div>}

        <input value={tripSearch} onChange={e=>setTripSearch(e.target.value)} placeholder={`Search trips, clients${isAdmin?' or agents':''}...`} style={{...inp,paddingLeft:36,fontSize:12}}/>
        {tripSearch&&<button onClick={()=>setTripSearch('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:14,color:T.textSub}}>×</button>}
      </div>
      <div style={{marginBottom:12}}>
        <button onClick={()=>setShowLegend(v=>!v)} style={{...btn,padding:'4px 12px',fontSize:10,background:'transparent',border:'1px solid '+T.border,color:T.textSub,textTransform:'none',letterSpacing:0}}>🗝️ Card Legend {showLegend?'▲':'▼'}</button>
        {showLegend&&<div style={{marginTop:8,background:T.white,border:'1px solid '+T.border,borderRadius:8,padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:11,fontWeight:700,color:T.navy,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>Trip Card Colors</div>
          <div style={{display:'flex',alignItems:'flex-start',gap:10,flexWrap:'wrap'}}>

            <div style={{display:'flex',alignItems:'center',gap:6,minWidth:200}}><div style={{width:14,height:14,borderRadius:3,border:'2px solid rgba(66,133,244,0.4)',flexShrink:0}}/><span style={{fontSize:11,color:T.textSec}}><strong style={{color:'#2a5bd7'}}>📅 Blue</strong> — Payment scheduled 2 weeks before due date to protect client funds.</span></div>

                </div>
              </div>}
            </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // Trip detail view
  return(

      {/* Summary Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8,marginBottom:16}}>
        {[{label:'Total Charged',val:cur(totalCharged),col:T.tealDeep},{label:'Collected',val:cur(totalPaid),col:totalPaid>=totalCharged?T.green:T.orange},{label:'Outstanding',val:cur(Math.max(0,totalCharged-totalPaid)),col:totalCharged-totalPaid>0?T.red:T.green},{label:'Total Costs',val:cur(totalCost),col:T.textSec},{label:'Stripe Fees',val:cur(totalStripeFees),col:T.red},{label:'Agent Commission',val:cur(agentDefinedComm),col:agentDefinedComm>=0?T.navy:T.red},{label:'Supplier Commission',val:cur(totalSupplierComm),col:T.green},{label:'Gross Profit',val:cur(grossProfit),col:grossProfit>0?T.green:T.red}].map(({label,val,col})=>(

      {/* Tabs */}

  async function load(){
    try{
      const pRes=await fetch(CHAT_SB_URL+'/rest/v1/agent_presence?select=agent_name&order=agent_name.asc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const pData=await pRes.json();
      if(Array.isArray(pData))setAgents(pData.map(a=>a.agent_name).filter(a=>a!==agentName));
      const tRes=await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips?order=created_at.desc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const tData=await tRes.json();
      if(Array.isArray(tData)){
        const mine=tData.filter(t=>t.lead_agent===agentName||(t.assisting_agents&&t.assisting_agents.includes(agentName)));
        setTrips(mine);
        if(selectedTrip){const updated=mine.find(t=>t.id===selectedTrip.id);if(updated)setSelectedTrip(updated);}
        // Load all tasks for my trips to show badges on cards
        if(mine.length>0){
          const tripIds=mine.map(t=>t.id).join(',');
          const tkRes=await fetch(CHAT_SB_URL+'/rest/v1/cowork_tasks?trip_id=in.('+tripIds+')&status=neq.completed&select=id,trip_id,assigned_to,status',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
          const tkData=await tkRes.json();
          if(Array.isArray(tkData)){
            setAllTasks(tkData);
            loadTaskUnreads(tkData.map(t=>t.id));
          }
        }
      }
      // Load announcements
      const ann=await chatReq('GET','team_chat',['select=*','channel=eq.announcements','order=created_at.asc','limit=100']);
      if(ann)setAnnounceMsgs(ann);
      setLoaded(true);
    }catch(e){setLoaded(true);}
  }

  async function loadMessages(tripId){
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/cowork_messages?trip_id=eq.'+tripId+'&order=created_at.asc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const data=await r.json();
      if(Array.isArray(data))setMessages(data);
    }catch(e){}
  }
  async function loadTasks(tripId){
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/cowork_tasks?trip_id=eq.'+tripId+'&order=created_at.desc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const data=await r.json();
      if(Array.isArray(data)){
        setTasks(data);
        loadTaskUnreads(data.map(t=>t.id));
      }
    }catch(e){}
  }
  async function loadTaskUnreads(taskIds){
    if(!taskIds||taskIds.length===0)return;
    try{
      // Get last read times for this agent
      const readRes=await fetch(CHAT_SB_URL+'/rest/v1/cowork_task_reads?agent_name=eq.'+encodeURIComponent(agentName)+'&task_id=in.('+taskIds.join(',')+')',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const reads=await readRes.json();
      const readMap={};
      if(Array.isArray(reads))reads.forEach(r=>{readMap[r.task_id]=r.last_read;});
      // Get reply counts after last read per task
      const unreads={};
      for(const tid of taskIds){
        const lastRead=readMap[tid]||'1970-01-01';
        const repRes=await fetch(CHAT_SB_URL+'/rest/v1/cowork_task_replies?task_id=eq.'+tid+'&created_at=gt.'+encodeURIComponent(lastRead)+'&sender=neq.'+encodeURIComponent(agentName)+'&select=id',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
        const reps=await repRes.json();
        if(Array.isArray(reps)&&reps.length>0)unreads[tid]=reps.length;
      }
      setTaskUnreads(unreads);
    }catch(e){}
  }
  async function markTaskRead(taskId){
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_task_reads',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({task_id:taskId,agent_name:agentName,last_read:new Date().toISOString()})});
      setTaskUnreads(prev=>{const n={...prev};delete n[taskId];return n;});
    }catch(e){}
  }
  async function loadTaskReplies(taskId){
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/cowork_task_replies?task_id=eq.'+taskId+'&order=created_at.asc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const data=await r.json();
      if(Array.isArray(data))setTaskReplies(data);
    }catch(e){}
  }
  async function createTask(){
    if(!taskForm.description.trim()){showToast('Task description is required','err');return;}
    if(!taskForm.assigned_to){showToast('Select who this task is assigned to','err');return;}
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/cowork_tasks',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify([{trip_id:selectedTrip.id,created_by:agentName,assigned_to:taskForm.assigned_to,task_type:taskForm.task_type||null,description:taskForm.description,due_date:taskForm.due_date||null,notes:taskForm.notes||null,status:'pending'}])});
      if(!r.ok){showToast('Could not create task','err');return;}
      setTaskForm({task_type:'',description:'',assigned_to:'',due_date:'',notes:''});
      setShowAddTask(false);showToast('Task created!');loadTasks(selectedTrip.id);
    }catch(e){showToast('Could not create task','err');}
  }
  async function sendTaskReply(){
    if(!taskReplyInput.trim()||!selectedTask)return;
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_task_replies',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify([{task_id:selectedTask.id,sender:agentName,message:taskReplyInput.trim()}])});
      setTaskReplyInput('');
      if((selectedTask.status==='pending'||selectedTask.status==='acknowledged')&&selectedTask.assigned_to===agentName){
        await updateTaskStatus(selectedTask.id,'in_progress');
      } else {
        loadTaskReplies(selectedTask.id);
      }
    }catch(e){showToast('Could not send reply','err');}
  }
  async function archiveTrip(tripId){
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips?id=eq.'+tripId,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({archived:true})});
      setTrips(prev=>prev.map(t=>t.id===tripId?{...t,archived:true}:t));
      if(selectedTrip?.id===tripId)setSelectedTrip(null);
      showToast('Trip archived.');
    }catch(e){showToast('Could not archive trip','err');}
  }
  async function restoreTrip(tripId){
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips?id=eq.'+tripId,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({archived:false})});
      setTrips(prev=>prev.map(t=>t.id===tripId?{...t,archived:false}:t));
      showToast('Trip restored to Active.');
    }catch(e){showToast('Could not restore trip','err');}
  }
  async function cancelTrip(tripId){
    if(!window.confirm('Cancel this trip? The record will be deleted permanently.'))return;
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips?id=eq.'+tripId,{method:'DELETE',headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      setTrips(prev=>prev.filter(t=>t.id!==tripId));
      if(selectedTrip?.id===tripId)setSelectedTrip(null);
      showToast('Trip cancelled and removed.');
    }catch(e){showToast('Could not cancel trip','err');}
  }
  async function updateTaskStatus(taskId,status){
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_tasks?id=eq.'+taskId,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({status})});
      loadTasks(selectedTrip.id);
      if(selectedTask?.id===taskId)setSelectedTask(prev=>({...prev,status}));
      showToast(status==='completed'?'Task marked complete! ✓':status==='acknowledged'?'Task acknowledged — the requester has been notified.':status==='in_progress'?'Task in progress!':'Task updated!');
    }catch(e){}
  }

  async function createTrip(){
    if(!createForm.client.trim()){showToast('Client name is required','err');return;}
    if(createForm.assisting_agents.length===0){showToast('Select at least one assisting agent','err');return;}
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify([{lead_agent:agentName,assisting_agents:createForm.assisting_agents,client:createForm.client,destination:createForm.destination||null,travel_dates:createForm.travel_dates||null,responsibilities:createForm.responsibilities,notes:createForm.notes||null,status:'active'}])});
      if(!r.ok){showToast('Could not create co-work trip','err');return;}
      setCreateForm({assisting_agents:[],client:'',destination:'',travel_dates:'',responsibilities:{},notes:''});
      setShowCreate(false);showToast('Co-work trip created! Agents notified.');load();
    }catch(e){showToast('Could not create co-work trip','err');}
  }

    try{
      await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips?id=eq.'+id,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({status:accept?'active':'declined'})});
