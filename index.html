        {tripTab==='tasks'&&<div style={{flex:1,overflowY:'auto',padding:'16px 20px'}}>
          {/* Task detail / reply view */}
          {selectedTask?<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
              <button onClick={()=>{setSelectedTask(null);setTaskReplies([]);}} style={{...btn,padding:'4px 10px',fontSize:10,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>← Back</button>
              <span style={{flex:1,fontWeight:700,fontSize:14,color:T.navy}}>{selectedTask.description}</span>
              {selectedTask.assigned_to===agentName&&selectedTask.status==='pending'&&<button onClick={()=>updateTaskStatus(selectedTask.id,'acknowledged')} style={{...btn,padding:'6px 14px',fontSize:11,background:'#fff3e0',border:'1px solid rgba(230,126,34,0.4)',color:'#c05c00'}}>👁 Acknowledge</button>}
              {selectedTask.assigned_to===agentName&&selectedTask.status==='acknowledged'&&<span style={{fontSize:11,color:T.goldDeep,background:T.goldPale,padding:'4px 10px',borderRadius:6,border:'1px solid '+T.gold}}>👁 Acknowledged — reply below</span>}
              {selectedTask.assigned_to===agentName&&selectedTask.status==='in_progress'&&<span style={{fontSize:11,color:T.tealDeep,background:T.tealPale,padding:'4px 10px',borderRadius:6,border:'1px solid '+T.teal}}>⚡ In Progress</span>}
              {selectedTask.assigned_to===agentName&&selectedTask.status!=='completed'&&<button onClick={()=>updateTaskStatus(selectedTask.id,'completed')} style={{...btn,padding:'6px 12px',fontSize:11,background:'#e6f4ed',border:'1px solid rgba(42,122,80,0.3)',color:'#2a7a50'}}>✓ Mark Complete</button>}
              {selectedTask.assigned_to!==agentName&&selectedTask.status==='acknowledged'&&<span style={{fontSize:11,color:'#c05c00',background:'#fff3e0',padding:'4px 10px',borderRadius:6}}>👁 Seen by {selectedTask.assigned_to}</span>}
              {selectedTask.assigned_to!==agentName&&selectedTask.status==='in_progress'&&<span style={{fontSize:11,color:T.tealDeep,background:T.tealPale,padding:'4px 10px',borderRadius:6,border:'1px solid '+T.teal}}>⚡ {selectedTask.assigned_to} is working on this</span>}
            </div>
            <div style={{background:T.cream,border:'1px solid '+T.border,borderRadius:8,padding:'10px 14px',marginBottom:12,display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
              {selectedTask.task_type&&<span style={{fontSize:11,background:T.goldPale,color:T.goldDeep,padding:'2px 8px',borderRadius:4,fontWeight:700}}>{selectedTask.task_type}</span>}
              <span style={{fontSize:11,color:T.textSec}}>From <strong>{selectedTask.created_by}</strong> → <strong>{selectedTask.assigned_to}</strong></span>
              {taskDueBadge(selectedTask.due_date)}
              <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:selectedTask.status==='completed'?'#eaf6f0':selectedTask.status==='in_progress'?T.tealPale:selectedTask.status==='acknowledged'?T.goldPale:T.orangePale,color:selectedTask.status==='completed'?T.green:selectedTask.status==='in_progress'?T.tealDeep:selectedTask.status==='acknowledged'?T.goldDeep:T.orange,border:'1px solid '+(selectedTask.status==='completed'?T.green:selectedTask.status==='in_progress'?T.teal:selectedTask.status==='acknowledged'?T.gold:'rgba(212,132,62,0.3)')}}>{selectedTask.status==='in_progress'?'In Progress':selectedTask.status==='acknowledged'?'👁 Seen':selectedTask.status.charAt(0).toUpperCase()+selectedTask.status.slice(1)}</span>
            </div>
            {selectedTask.notes&&<div style={{fontSize:12,color:T.textSub,fontStyle:'italic',marginBottom:12,padding:'8px 12px',background:'#fafaf8',borderRadius:6,border:'1px solid '+T.border}}>{selectedTask.notes}</div>}
            <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:8,marginBottom:10}}>
              {taskReplies.length===0&&<div style={{textAlign:'center',padding:'24px 0',color:T.textSub,fontSize:13}}>No replies yet — add your response or questions below.</div>}
              {taskReplies.map((r,i)=>{const mine=r.sender===agentName;return(<div key={i} style={{display:'flex',flexDirection:mine?'row-reverse':'row',gap:8,alignItems:'flex-end'}}>
                {!mine&&<div style={{width:26,height:26,borderRadius:'50%',background:T.tealPale,border:'1px solid '+T.teal,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:T.tealDeep,flexShrink:0}}>{(r.sender||'?')[0]}</div>}
                <div style={{maxWidth:'75%'}}>
                  {!mine&&<div style={{fontSize:9,color:T.textSub,marginBottom:2,letterSpacing:'0.06em',textTransform:'uppercase'}}>{r.sender}</div>}
                  <div style={{background:mine?T.tealDeep:T.white,color:mine?'#fff':T.navy,padding:'8px 12px',borderRadius:mine?'12px 12px 2px 12px':'12px 12px 12px 2px',fontSize:13,lineHeight:1.5,border:mine?'none':'1px solid '+T.border,wordBreak:'break-word'}}>{r.message}</div>
                  <div style={{fontSize:9,color:T.textSub,marginTop:2,textAlign:mine?'right':'left'}}>{fmtTime(r.created_at)}</div>
                </div>
              </div>);})}
            </div>
            {selectedTask.status!=='completed'&&<div style={{display:'flex',gap:8,alignItems:'center',paddingTop:8,borderTop:'1px solid '+T.border}}>
              <input value={taskReplyInput} onChange={e=>setTaskReplyInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendTaskReply()} placeholder="Reply to this task..." style={{flex:1,padding:'9px 13px',border:'1px solid '+T.border,borderRadius:22,fontSize:13,outline:'none',fontFamily:'Georgia,serif',background:T.cream}}/>
              <button onClick={sendTaskReply} disabled={!taskReplyInput.trim()} style={{background:T.tealDeep,border:'none',borderRadius:'50%',width:36,height:36,cursor:'pointer',fontSize:16,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',opacity:taskReplyInput.trim()?1:0.4}}>↑</button>
            </div>}
          </div>:
          /* Task list */
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{display:'flex',gap:6}}>
                {[['all','All'],['pending','Pending'],['acknowledged','Seen'],['in_progress','In Progress'],['completed','Done']].map(([f,label])=>{const fc=f==='all'?T.navy:f==='pending'?T.orange:f==='acknowledged'?T.goldDeep:f==='in_progress'?T.tealDeep:T.green;return<button key={f} onClick={()=>setTaskFilter(f)} style={{...btn,padding:'5px 14px',fontSize:11,background:taskFilter===f?fc:'transparent',border:'1px solid '+(taskFilter===f?fc:T.border),color:taskFilter===f?'#fff':T.textSec,textTransform:'none',letterSpacing:0}}>{label}</button>;})}
              </div>
              {selectedTrip.status==='active'&&<button onClick={()=>setShowAddTask(v=>!v)} style={{...btn,padding:'7px 16px',fontSize:11,background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',border:'1px solid '+T.gold,color:T.goldLight}}>{showAddTask?'− Close':'+ New Task'}</button>}
            </div>
            {showAddTask&&<div style={{background:T.white,border:'1px solid '+T.gold,borderRadius:10,padding:'16px 18px',marginBottom:16,boxShadow:'0 2px 12px rgba(27,45,58,0.08)'}}>
              <div style={{fontSize:11,color:T.goldDeep,letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:14,fontWeight:700}}>New Task</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:12}}>
                <div>
                  <label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Assign To *</label>
                  <select value={taskForm.assigned_to} onChange={e=>setTaskForm(f=>({...f,assigned_to:e.target.value}))} style={{width:'100%',padding:'8px 10px',border:'1px solid '+T.border,borderRadius:6,fontSize:12,color:T.text,background:T.cream,outline:'none'}}>
                    <option value="">Select agent...</option>
                    {[selectedTrip.lead_agent,...(selectedTrip.assisting_agents||[])].filter(a=>a!==agentName).map(a=><option key={a}>{a}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Task Type</label>
                  <select value={taskForm.task_type} onChange={e=>setTaskForm(f=>({...f,task_type:e.target.value}))} style={{width:'100%',padding:'8px 10px',border:'1px solid '+T.border,borderRadius:6,fontSize:12,color:T.text,background:T.cream,outline:'none'}}>
                    <option value="">Select type...</option>
                    {TASK_TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Due Date</label>
                  <input type="date" value={taskForm.due_date} onChange={e=>setTaskForm(f=>({...f,due_date:e.target.value}))} style={{width:'100%',padding:'8px 10px',border:'1px solid '+T.border,borderRadius:6,fontSize:12,color:T.text,background:T.cream,outline:'none'}}/>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Task Description *</label>
                <textarea value={taskForm.description} onChange={e=>setTaskForm(f=>({...f,description:e.target.value}))} rows={3} style={{width:'100%',padding:'8px 10px',border:'1px solid '+T.border,borderRadius:6,fontSize:13,color:T.text,background:T.cream,outline:'none',resize:'vertical',fontFamily:'Georgia,serif'}} placeholder="What do you need from this agent?"/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{display:'block',fontSize:10,letterSpacing:'0.1em',color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Additional Notes</label>
                <input value={taskForm.notes} onChange={e=>setTaskForm(f=>({...f,notes:e.target.value}))} style={{width:'100%',padding:'8px 10px',border:'1px solid '+T.border,borderRadius:6,fontSize:12,color:T.text,background:T.cream,outline:'none'}} placeholder="Client intel, preferences, context..."/>
              </div>
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <button onClick={()=>setShowAddTask(false)} style={{...btn,padding:'7px 16px',fontSize:11,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>Cancel</button>
                <button onClick={createTask} style={{...btn,padding:'8px 18px',fontSize:11,background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',border:'1px solid '+T.gold,color:T.goldLight}}>Send Task →</button>
              </div>
            </div>}
            {tasks.filter(t=>taskFilter==='all'||t.status===taskFilter).length===0&&<div style={{textAlign:'center',padding:'40px 0',color:T.textSub,fontSize:13}}><div style={{fontSize:28,marginBottom:10}}>✅</div>{taskFilter==='completed'?'No completed tasks yet.':'No tasks yet — create one above.'}</div>}
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {tasks.filter(t=>taskFilter==='all'||t.status===taskFilter).map(task=>{
                const isAssigned=task.assigned_to===agentName;
                return(<div key={task.id} onClick={()=>{setSelectedTask(task);loadTaskReplies(task.id);markTaskRead(task.id);}} style={{background:T.white,border:'1px solid '+(task.status==='completed'?T.border:isAssigned&&task.status==='pending'?T.orange:T.tealDeep),borderRadius:10,padding:'12px 16px',cursor:'pointer',boxShadow:'0 2px 8px rgba(27,45,58,0.05)'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:6}}>
                        {task.task_type&&<span style={{fontSize:10,fontWeight:700,background:T.goldPale,color:T.goldDeep,padding:'2px 7px',borderRadius:4}}>{task.task_type}</span>}
                        <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:task.status==='completed'?'#eaf6f0':task.status==='in_progress'?T.tealPale:task.status==='acknowledged'?T.goldPale:T.orangePale,color:task.status==='completed'?T.green:task.status==='in_progress'?T.tealDeep:task.status==='acknowledged'?T.goldDeep:T.orange,border:'1px solid '+(task.status==='completed'?T.green:task.status==='in_progress'?T.teal:task.status==='acknowledged'?T.gold:'rgba(212,132,62,0.3)')}}>{task.status==='in_progress'?'In Progress':task.status==='acknowledged'?'👁 Seen':task.status.charAt(0).toUpperCase()+task.status.slice(1)}</span>
                        {isAssigned?<span style={{fontSize:9,color:T.tealDeep,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>Assigned to you</span>:<span style={{fontSize:9,color:T.tealDeep,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>You assigned</span>}
                      </div>
                      <div style={{fontSize:13,color:T.navy,fontWeight:600,lineHeight:1.4,marginBottom:4}}>{task.description}</div>
                      <div style={{fontSize:11,color:T.textSec}}>{task.created_by} → {task.assigned_to}</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                      {taskDueBadge(task.due_date)}
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                      {taskDueBadge(task.due_date)}
                      {taskUnreads[task.id]&&<span style={{background:T.tealDeep,color:'#fff',fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:20}}>💬 {taskUnreads[task.id]} new</span>}
                      <span style={{fontSize:10,color:T.textSub}}>→ Open</span>
                    </div>
                    </div>
                  </div>
                </div>);
              })}
            </div>
          </div>}
        </div>}
      </div>
    );
  }

  /* ── Trip List View ── */
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'16px 24px 0',background:T.cream,borderBottom:'1px solid '+T.border,flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div style={{fontSize:10,letterSpacing:'0.16em',color:T.textSec,textTransform:'uppercase',marginBottom:3}}>Agent Collaboration</div>
            <div style={{fontSize:19,fontWeight:700,color:T.navy}}>🤝 Co-Work Hub</div>
          </div>
          <button onClick={()=>setShowCreate(v=>!v)} style={{...btn,padding:'9px 20px',fontSize:11,background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',border:'1px solid '+T.gold,color:T.goldLight}}>{showCreate?'− Close':'+ New Co-Work Trip'}</button>
        </div>
        
        <div style={{display:'flex',gap:6,marginBottom:0,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:9,color:T.textSub,letterSpacing:'0.12em',textTransform:'uppercase',marginRight:4}}>Show:</span>
          {[['all','All Trips'],['active','Active Trips'],['archived','Archived'],['completed','Completed Trips']].map(([f,label])=><button key={f} onClick={()=>setFilter(f)} style={{...btn,padding:'6px 14px',fontSize:10,background:filter===f?T.tealDeep:'transparent',border:'1px solid '+(filter===f?T.tealDeep:T.border),color:filter===f?'#fff':T.textSec,textTransform:'none',letterSpacing:0}}>{label}{f==='pending'&&trips.filter(t=>t.status==='pending').length>0?' ('+trips.filter(t=>t.status==='pending').length+')':''}</button>)}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
        {/* Create Form */}
        {showCreate&&<div style={{background:T.white,border:'1px solid '+T.gold,borderRadius:10,padding:'20px 22px',marginBottom:20,boxShadow:'0 2px 16px rgba(27,45,58,0.08)'}}>
          <div style={{fontSize:11,letterSpacing:'0.14em',color:T.gold,textTransform:'uppercase',marginBottom:16,fontWeight:700}}>New Co-Work Trip</div>
          <div style={{background:T.tealPale,border:'1px solid rgba(46,139,139,0.2)',borderRadius:6,padding:'8px 12px',marginBottom:14,fontSize:11,color:T.tealDeep}}>
            <strong>You are the Trip Lead.</strong> Select up to 2 agents to assist.
          </div>
          {/* Assisting agents - searchable */}
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:8}}>Assisting Agent(s) * (max 2)</label>
            {createForm.assisting_agents.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
              {createForm.assisting_agents.map(a=><span key={a} style={{display:'inline-flex',alignItems:'center',gap:6,background:T.tealDeep,color:'#fff',padding:'4px 10px',borderRadius:20,fontSize:12,fontWeight:700}}>{a}<button onClick={()=>toggleAssist(a)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.8)',cursor:'pointer',fontSize:13,padding:0,lineHeight:1}}>×</button></span>)}
            </div>}
            {createForm.assisting_agents.length<2&&<AgentSearch agents={agents} selected={createForm.assisting_agents} onSelect={name=>toggleAssist(name)} placeholder="Type to search agents..."/>}
            {agents.length===0&&<span style={{fontSize:12,color:T.textSub}}>No other agents online yet</span>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:14}}>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Client Name *</label><input value={createForm.client} onChange={e=>setCreateForm(f=>({...f,client:e.target.value}))} style={inp} placeholder="Client name..."/></div>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Destination</label><input value={createForm.destination} onChange={e=>setCreateForm(f=>({...f,destination:e.target.value}))} style={inp} placeholder="e.g. Italy..."/></div>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Travel Dates</label><input value={createForm.travel_dates} onChange={e=>setCreateForm(f=>({...f,travel_dates:e.target.value}))} style={inp} placeholder="e.g. June 10-20, 2026..."/></div>
          </div>
          {/* Responsibilities */}
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:8}}>What help is needed? (select all that apply)</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
              {RESP_OPTIONS.map(r=>{const sel=!!createForm.responsibilities[r];return<button key={r} onClick={()=>toggleResp(r)} style={{...btn,padding:'5px 13px',fontSize:11,background:sel?'#e6f4ed':T.cream,border:'1px solid '+(sel?'rgba(42,122,80,0.4)':T.border),color:sel?'#2a7a50':T.text,textTransform:'none',letterSpacing:0}}>{sel?'✓ ':''}{r}</button>;})}
            </div>
          </div>
          <div style={{marginBottom:14}}><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Notes / Context</label><textarea value={createForm.notes} onChange={e=>setCreateForm(f=>({...f,notes:e.target.value}))} rows={3} style={{...inp,resize:'vertical'}} placeholder="What does the assisting agent need to know?"/></div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <button onClick={()=>setShowCreate(false)} style={{...btn,padding:'8px 18px',background:'transparent',border:'1px solid '+T.border,color:T.textSec,fontSize:11}}>Cancel</button>
            <button onClick={createTrip} style={{...btn,padding:'9px 20px',background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',border:'1px solid '+T.gold,color:T.goldLight,fontSize:11}}>Create Co-Work Trip →</button>
          </div>
        </div>}

        {/* Trip List */}
        {filteredTrips.length===0&&<div style={{textAlign:'center',padding:'64px 0',color:T.textSub}}><div style={{fontSize:34,marginBottom:14}}>🤝</div><div style={{fontSize:13,letterSpacing:'0.1em'}}>{filter==='active'?'No active co-work trips.':filter==='pending'?'No pending requests.':filter==='completed'?'No completed trips.':'No co-work trips yet.'}</div></div>}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filteredTrips.map(trip=>{
            const isLead=trip.lead_agent===agentName;
            const isPendingForMe=trip.status==='pending'&&!isLead&&trip.assisting_agents?.includes(agentName);
            const resp=trip.responsibilities||{};
            const activeResp=Object.keys(resp).filter(k=>resp[k]);
            return(
              <div key={trip.id} style={{background:T.white,border:'1px solid '+(allTasks.some(t=>t.trip_id===trip.id&&t.assigned_to===agentName&&(t.status==='pending'||t.status==='acknowledged'))?T.orange:trip.status==='active'?T.tealDeep:T.border),borderRadius:12,overflow:'hidden',boxShadow:'0 2px 10px rgba(27,45,58,0.06)'}}>
                <div style={{height:3,background:isPendingForMe?'linear-gradient(90deg,#e67e22,#f0a070)':trip.status==='active'?'linear-gradient(90deg,'+purple+',#9b7cc7)':trip.status==='completed'?'linear-gradient(90deg,'+T.tealDeep+','+T.teal+')':'linear-gradient(90deg,'+T.border+','+T.border+')'}}/>
                <div style={{padding:'14px 18px'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                    <div style={{flex:1,cursor:'pointer'}} onClick={()=>{setSelectedTrip(trip);loadMessages(trip.id);}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                        {isLead?<span style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'#fff',background:T.tealDeep,padding:'2px 7px',borderRadius:4}}>⭐ Lead Agent</span>:<span style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'#fff',background:T.tealDeep,padding:'2px 7px',borderRadius:4}}>🤝 Assisting</span>}
                        <span style={{display:'inline-block',padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:trip.archived?'#f1efe8':trip.status==='active'?'#e6f4ed':trip.status==='completed'?T.tealPale:T.orangePale,color:trip.archived?'#7a6e5f':trip.status==='active'?'#2a7a50':trip.status==='completed'?T.tealDeep:T.orange,border:'1px solid '+(trip.archived?'rgba(122,110,95,0.3)':trip.status==='active'?'rgba(42,122,80,0.3)':trip.status==='completed'?'rgba(46,139,139,0.3)':'rgba(212,132,62,0.3)')}}>{trip.archived?'📦 Archived':trip.status.charAt(0).toUpperCase()+trip.status.slice(1)}</span>
                        {(()=>{const myP=allTasks.filter(t=>t.trip_id===trip.id&&t.assigned_to===agentName&&(t.status==='pending'||t.status==='acknowledged'));const totOpen=allTasks.filter(t=>t.trip_id===trip.id).length;const tripUnread=allTasks.filter(t=>t.trip_id===trip.id&&taskUnreads[t.id]).reduce((s,t)=>s+(taskUnreads[t.id]||0),0);return <React.Fragment>{myP.length>0&&<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:20,fontSize:10,fontWeight:700,background:T.orangePale,color:T.orange,border:'1px solid rgba(212,132,62,0.4)'}}>📋 {myP.length} task{myP.length>1?'s':''} need your attention</span>}{myP.length===0&&totOpen>0&&<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:20,fontSize:10,fontWeight:700,background:T.tealPale,color:T.tealDeep,border:'1px solid rgba(46,139,139,0.3)'}}>✅ {totOpen} open task{totOpen>1?'s':''}</span>}{tripUnread>0&&<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:20,fontSize:10,fontWeight:700,background:T.tealDeep,color:'#fff'}}>💬 {tripUnread} new</span>}</React.Fragment>;})()}
                      </div>
                      <div style={{fontWeight:700,fontSize:15,color:T.navy,marginBottom:4}}>{trip.client}</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:6}}>
                        {trip.destination&&<span style={{fontSize:11,color:T.textSec,background:T.cream,padding:'2px 8px',borderRadius:4,border:'1px solid '+T.border}}>✈️ {trip.destination}</span>}
                        {trip.travel_dates&&<span style={{fontSize:11,color:T.textSec,background:T.cream,padding:'2px 8px',borderRadius:4,border:'1px solid '+T.border}}>📅 {trip.travel_dates}</span>}
                      </div>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                        <span style={{fontSize:10,color:T.textSub,letterSpacing:'0.08em',textTransform:'uppercase'}}>Lead:</span>
                        <span style={{fontSize:11,color:purple,fontWeight:700}}>{trip.lead_agent}</span>
                        {(trip.assisting_agents||[]).map(a=><span key={a} style={{fontSize:11,color:T.tealDeep,fontWeight:700}}>+ {a}</span>)}
                        {activeResp.length>0&&<span style={{fontSize:10,color:T.textSub,marginLeft:4}}>· {activeResp.join(', ')}</span>}
                      </div>
                      {trip.notes&&<div style={{fontSize:11,color:T.textSub,fontStyle:'italic',marginTop:4,lineHeight:1.4}}>{trip.notes}</div>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0,alignItems:'flex-end'}}>
                      
                      {trip.status==='active'&&<button onClick={()=>{setSelectedTrip(trip);loadMessages(trip.id);}} style={{...btn,padding:'6px 14px',fontSize:11,background:T.tealPale,border:'1px solid '+T.tealDeep,color:T.tealDeep}}>💬 Open Chat</button>}
                      {trip.status==='active'&&isLead&&<button onClick={()=>markComplete(trip.id)} style={{...btn,padding:'5px 12px',fontSize:10,background:'#e6f4ed',border:'1px solid rgba(42,122,80,0.3)',color:'#2a7a50'}}>✓ Complete</button>}
                      {!trip.archived&&isLead&&<button onClick={()=>archiveTrip(trip.id)} style={{...btn,padding:'5px 12px',fontSize:10,background:'#f5f3ef',border:'1px solid #c8c0b0',color:'#7a6e5f'}}>📦 Archive</button>}
                      {trip.archived&&isLead&&<button onClick={()=>restoreTrip(trip.id)} style={{...btn,padding:'5px 12px',fontSize:10,background:T.goldPale,border:'1px solid '+T.gold,color:T.goldDeep}}>↩ Restore</button>}
                      {isLead&&<button onClick={()=>cancelTrip(trip.id)} style={{...btn,padding:'4px 9px',fontSize:9,background:'transparent',border:'1px solid #fcc',color:T.red}}>✕ Cancel</button>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── Referral System ── */
function ReferralView({session,showToast,onAccept}){
  const agentName=session?.user?.user_metadata?.full_name||session?.user?.email||'Agent';
  const[tab,setTab]=React.useState('inbox');
  const[received,setReceived]=React.useState([]);
  const[sent,setSent]=React.useState([]);
  const[agents,setAgents]=React.useState([]);
  const[showSend,setShowSend]=React.useState(false);
  const[loaded,setLoaded]=React.useState(false);
  const[sendForm,setSendForm]=React.useState({to_agent:'',client:'',phone:'',email:'',destination:'',notes:'',is_website_referral:false});
  const[editingRef,setEditingRef]=React.useState(null);
  const[editForm,setEditForm]=React.useState({});
  const WEBSITE_AGENTS=['Christina Garcia','Tabitha Garcia','Andrea Gunter'];
  const canSendWebsite=WEBSITE_AGENTS.includes(agentName)||WEBSITE_AGENTS.some(n=>agentName&&n.toLowerCase().includes(agentName.toLowerCase().split(' ')[0]));
  const pollRef=React.useRef(null);
  React.useEffect(()=>{load();pollRef.current=setInterval(load,15000);return()=>clearInterval(pollRef.current);},[]);
  async function load(){
    try{
      const pRes=await fetch(CHAT_SB_URL+'/rest/v1/agent_presence?select=agent_name,last_seen&order=agent_name.asc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const presData=await pRes.json();
      if(presData)setAgents(presData.filter(a=>a.agent_name!==agentName).map(a=>a.agent_name));
      const rRes=await fetch(CHAT_SB_URL+'/rest/v1/agent_referrals?to_agent=eq.'+encodeURIComponent(agentName)+'&order=created_at.desc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const recData=await rRes.json();
      if(Array.isArray(recData))setReceived(recData);
      const sRes=await fetch(CHAT_SB_URL+'/rest/v1/agent_referrals?from_agent=eq.'+encodeURIComponent(agentName)+'&order=created_at.desc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const sentData=await sRes.json();
      if(Array.isArray(sentData))setSent(sentData);
      // Load announcements
      const ann=await chatReq('GET','team_chat',['select=*','channel=eq.announcements','order=created_at.asc','limit=100']);
      if(ann)setAnnounceMsgs(ann);
      setLoaded(true);
    }catch(e){setLoaded(true);}
  }
  async function sendReferral(){
    if(!sendForm.to_agent){showToast('Select an agent to send to','err');return;}
    if(!sendForm.client.trim()){showToast('Client name is required','err');return;}
    try{
      const r=await fetch(CHAT_SB_URL+'/rest/v1/agent_referrals',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify([{from_agent:agentName,to_agent:sendForm.to_agent,client:sendForm.client,phone:sendForm.phone||null,email:sendForm.email||null,destination:sendForm.destination||null,notes:sendForm.notes||null,status:'new',is_website_referral:sendForm.is_website_referral||false}])});
      if(!r.ok){showToast('Could not send referral','err');return;}
      setSendForm({to_agent:'',client:'',phone:'',email:'',destination:'',notes:'',is_website_referral:false});
      setShowSend(false);showToast('Referral sent to '+sendForm.to_agent+'! 🎉');load();
    }catch(e){showToast('Could not send referral','err');}
  }
  async function updateStatus(id,status){
    try{await fetch(CHAT_SB_URL+'/rest/v1/agent_referrals?id=eq.'+id,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({status})});load();}catch(e){}
  }
  async function editReferral(ref){
    setEditingRef(ref.id);
    setEditForm({to_agent:ref.to_agent,client:ref.client,phone:ref.phone||'',email:ref.email||'',destination:ref.destination||'',notes:ref.notes||'',is_website_referral:ref.is_website_referral||false});
  }
  async function saveEdit(id){
    try{
      await fetch(CHAT_SB_URL+'/rest/v1/agent_referrals?id=eq.'+id,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify({client:editForm.client,phone:editForm.phone||null,email:editForm.email||null,destination:editForm.destination||null,notes:editForm.notes||null,is_website_referral:editForm.is_website_referral||false})});
      setEditingRef(null);showToast('Referral updated!');load();
    }catch(e){showToast('Could not save','err');}
  }
  async function acceptReferral(ref){
    await updateStatus(ref.id,'accepted');
    onAccept(ref);
    showToast('Referral accepted! Added to New Inquiries. 🎉');
  }
  const newCount=received.filter(r=>r.status==='new').length;

  function statusBadge(s){const styles={new:{bg:'#fff3e0',color:'#e67e22',border:'rgba(230,126,34,0.3)',label:'New'},accepted:{bg:'#e6f4ed',color:'#2a7a50',border:'rgba(42,122,80,0.3)',label:'Accepted'},declined:{bg:T.redPale,color:T.red,border:'rgba(192,57,43,0.3)',label:'Declined'}};const st=styles[s]||styles.new;return<span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:10,fontWeight:700,background:st.bg,color:st.color,border:'1px solid '+st.border}}>{st.label}</span>;}

          <div>
            <div style={{fontSize:10,letterSpacing:'0.16em',color:T.textSec,textTransform:'uppercase',marginBottom:3}}>Agent Network</div>
            <div style={{fontSize:19,fontWeight:700,color:T.navy}}>📨 Referrals</div>
          </div>
          <button onClick={()=>setShowSend(v=>!v)} style={{...btn,padding:'9px 20px',fontSize:11,background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',border:'1px solid #e67e22',color:'#f0a070'}}>{showSend?'− Close':'+ Send Referral'}</button>
        </div>
        <div style={{display:'flex',borderBottom:'1px solid '+T.border}}>
          <button onClick={()=>setTab('inbox')} style={tabS('inbox')}>📥 Inbox{newCount>0&&<span style={{background:'#e67e22',color:'#fff',borderRadius:20,padding:'1px 6px',fontSize:9,marginLeft:5}}>{newCount}</span>}</button>
          <button onClick={()=>setTab('sent')} style={tabS('sent')}>📤 Sent ({sent.length})</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
        {showSend&&<div style={{background:T.white,border:'1px solid #e67e22',borderRadius:10,padding:'20px 22px',marginBottom:20,boxShadow:'0 2px 16px rgba(27,45,58,0.08)'}}>
          <div style={{fontSize:11,letterSpacing:'0.14em',color:'#e67e22',textTransform:'uppercase',marginBottom:16,fontWeight:700}}>Send a Client Referral</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:14}}>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Send To *</label>
            <select value={sendForm.to_agent} onChange={e=>setSendForm(f=>({...f,to_agent:e.target.value}))} style={{...inp,width:'100%'}}><option value="">Select agent...</option>{agents.map(a=><option key={a}>{a}</option>)}</select></div>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Client Name *</label><input value={sendForm.client} onChange={e=>setSendForm(f=>({...f,client:e.target.value}))} style={inp} placeholder="Client name..."/></div>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Phone</label><input value={sendForm.phone} onChange={e=>setSendForm(f=>({...f,phone:e.target.value}))} style={inp} placeholder="Phone number..."/></div>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Email</label><input value={sendForm.email} onChange={e=>setSendForm(f=>({...f,email:e.target.value}))} style={inp} placeholder="Email address..."/></div>
            <div><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Destination / Interest</label><input value={sendForm.destination} onChange={e=>setSendForm(f=>({...f,destination:e.target.value}))} style={inp} placeholder="e.g. Caribbean cruise..."/></div>

          <div style={{marginBottom:14}}><label style={{display:'block',fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',marginBottom:5}}>Notes</label><textarea value={sendForm.notes} onChange={e=>setSendForm(f=>({...f,notes:e.target.value}))} rows={3} style={{...inp,resize:'vertical'}} placeholder="Any details about the client or their needs..."/></div>

          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>

        {tab==='inbox'&&<>

                        {ref.email&&<span onClick={()=>{navigator.clipboard.writeText(ref.email);showToast('Email copied!');}} style={{fontSize:12,color:T.textSec,background:T.cream,padding:'2px 10px',borderRadius:4,border:'1px solid '+T.border,cursor:'pointer',userSelect:'text'}} title="Click to copy">✉️ {ref.email} <span style={{fontSize:9,color:T.textSub}}>copy</span></span>}
                        {ref.destination&&<span style={{fontSize:12,color:T.textSec,background:T.cream,padding:'2px 10px',borderRadius:4,border:'1px solid '+T.border,userSelect:'text'}}>✈️ {ref.destination}</span>}
                      </div>
                      {ref.notes&&<div onClick={()=>{navigator.clipboard.writeText(ref.notes);showToast('Notes copied!');}} style={{fontSize:12,color:T.textSub,fontStyle:'italic',lineHeight:1.5,marginTop:4,cursor:'pointer',userSelect:'text'}} title="Click to copy">{ref.notes} <span style={{fontSize:9,color:T.textSub}}>copy</span></div>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>

                      {ref.notes&&<div style={{fontSize:12,color:T.textSub,fontStyle:'italic',lineHeight:1.5,marginTop:4}}>{ref.notes}</div>}
                      {editingRef===ref.id&&<div style={{marginTop:12,padding:'14px',background:'#f5f3ef',borderRadius:8,border:'1px solid '+T.border}}>
                        <div style={{fontSize:10,color:T.textSec,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10,fontWeight:700}}>Edit Referral</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:8,marginBottom:10}}>
                          <div><label style={{display:'block',fontSize:10,color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Client Name</label><input value={editForm.client||''} onChange={e=>setEditForm(f=>({...f,client:e.target.value}))} style={inp}/></div>
                          <div><label style={{display:'block',fontSize:10,color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Phone</label><input value={editForm.phone||''} onChange={e=>setEditForm(f=>({...f,phone:e.target.value}))} style={inp}/></div>
                          <div><label style={{display:'block',fontSize:10,color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Email</label><input value={editForm.email||''} onChange={e=>setEditForm(f=>({...f,email:e.target.value}))} style={inp}/></div>
                          <div><label style={{display:'block',fontSize:10,color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Destination</label><input value={editForm.destination||''} onChange={e=>setEditForm(f=>({...f,destination:e.target.value}))} style={inp}/></div>
                        </div>
                        <div style={{marginBottom:10}}><label style={{display:'block',fontSize:10,color:T.textSec,textTransform:'uppercase',marginBottom:4}}>Notes</label><textarea value={editForm.notes||''} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} rows={2} style={{...inp,resize:'vertical'}}/></div>
                        {canSendWebsite&&<div style={{marginBottom:10,display:'flex',alignItems:'center',gap:8}}><input type="checkbox" checked={editForm.is_website_referral||false} onChange={e=>setEditForm(f=>({...f,is_website_referral:e.target.checked}))} style={{width:14,height:14}}/><span style={{fontSize:11,color:'#c05c00',fontWeight:700}}>🌐 Website Referral (60/40 split)</span></div>}
                        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                          <button onClick={()=>setEditingRef(null)} style={{...btn,padding:'6px 14px',fontSize:10,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>Cancel</button>
                          <button onClick={()=>saveEdit(ref.id)} style={{...btn,padding:'6px 16px',fontSize:10,background:T.navy,border:'1px solid '+T.gold,color:T.goldLight}}>Save</button>
                        </div>
                      </div>}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>}
        </>}
      </div>
    </div>
  );
}

/* ── Commission Tracker ── */
function CommissionView({session,sb,showToast}){
  const[tab,setTab]=React.useState('dash');
  const[manual,setManual]=React.useState([]);
  const[pending,setPending]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[dashYear,setDashYear]=React.useState(new Date().getFullYear());
  const[showAddPay,setShowAddPay]=React.useState(false);
  const[showAddPend,setShowAddPend]=React.useState(false);
  const[paySearch,setPaySearch]=React.useState('');
  const[payYear,setPayYear]=React.useState('all');
  const[payForm,setPayForm]=React.useState({client:'',supplier:'',ref:'',paid_date:'',year:new Date().getFullYear(),amount:'',notes:''});
  const[pendForm,setPendForm]=React.useState({client:'',supplier:'',ref:'',gross:'',supplier_pct:'',supplier_comm_dollar:'',agent_split_pct:'',expected_amount:'',expected_date:'',year:new Date().getFullYear(),notes:'',referral_type:'standard'});
  const[commInputMode,setCommInputMode]=React.useState('dollar');
  const[editingPend,setEditingPend]=React.useState(null);
  const[editPendForm,setEditPendForm]=React.useState({});
  const[editCommInputMode,setEditCommInputMode]=React.useState('dollar');
  const uid2=session.user.id;
  const YEARS=[];for(let y=2024;y<=2036;y++)YEARS.push(y);
  React.useEffect(()=>{loadData();},[]);
  async function loadData(){
    setLoading(true);
    const[{data:mp},{data:pc}]=await Promise.all([
      sb.from('manual_payments').select('*').eq('user_id',uid2).order('created_at',{ascending:false}),
      sb.from('pending_commissions').select('*').eq('user_id',uid2).order('created_at',{ascending:false})
    ]);
    setManual(mp||[]);setPending(pc||[]);setLoading(false);
  }
  function cur(n){if(n==null||isNaN(n))return'--';return'$'+parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
  function calcComm(form){
    const g=parseFloat(form.gross)||0,p=parseFloat(form.supplier_pct)||0,d=parseFloat(form.supplier_comm_dollar)||0,s=parseFloat(form.agent_split_pct)||0;
    const supplierComm=d>0?d:(g>0&&p>0?g*(p/100):0);
    if(supplierComm>0&&s>0)return(supplierComm*(s/100)).toFixed(2);
    if(supplierComm>0)return supplierComm.toFixed(2);
    return'';
  }
  async function savePay(){
    if(!payForm.amount){showToast('Enter a commission amount','err');return;}
    const newId=crypto.randomUUID();
    const newPay={...payForm,id:newId,user_id:uid2,amount:parseFloat(payForm.amount),year:parseInt(payForm.year),created_at:new Date().toISOString()};
    setManual(prev=>[newPay,...prev]);
    setShowAddPay(false);
    setPayForm({client:'',supplier:'',ref:'',paid_date:'',year:new Date().getFullYear(),amount:'',notes:''});
    const tok=(JSON.parse(localStorage.getItem('pmtp_s')||'null')||{}).access_token||window.PMTP.SUPABASE_KEY;
    const r=await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/manual_payments',{method:'POST',headers:{'Content-Type':'application/json','apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},body:JSON.stringify({...payForm,id:newId,user_id:uid2,amount:parseFloat(payForm.amount),year:parseInt(payForm.year)})});
    if(!r.ok){showToast('Could not save payment','err');setManual(prev=>prev.filter(x=>x.id!==newId));return;}
    showToast('Payment saved!');
  }
  async function delPay(id){
    setManual(prev=>prev.filter(x=>x.id!==id));
    const tok=(JSON.parse(localStorage.getItem('pmtp_s')||'null')||{}).access_token||window.PMTP.SUPABASE_KEY;
    await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/manual_payments?id=eq.'+id,{method:'DELETE',headers:{'apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok}});
  }
  async function savePend(){
    const amt=pendForm.expected_amount||calcComm(pendForm);
    if(!amt){showToast('Enter or calculate an expected amount','err');return;}
    const newId=crypto.randomUUID();
    const newRec={...pendForm,id:newId,user_id:uid2,gross:parseFloat(pendForm.gross)||null,supplier_pct:parseFloat(pendForm.supplier_pct)||null,supplier_comm_dollar:parseFloat(pendForm.supplier_comm_dollar)||null,agent_split_pct:parseFloat(pendForm.agent_split_pct)||null,expected_amount:parseFloat(amt),year:parseInt(pendForm.year),status:'pending',created_at:new Date().toISOString()};
    setPending(prev=>[newRec,...prev]);
    setShowAddPend(false);
    setPendForm({client:'',supplier:'',ref:'',gross:'',supplier_pct:'',supplier_comm_dollar:'',agent_split_pct:'',expected_amount:'',expected_date:'',year:new Date().getFullYear(),notes:'',referral_type:'standard'});setCommInputMode('dollar');
    const tok=(JSON.parse(localStorage.getItem('pmtp_s')||'null')||{}).access_token||window.PMTP.SUPABASE_KEY;
    const r=await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/pending_commissions',{method:'POST',headers:{'Content-Type':'application/json','apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},body:JSON.stringify({...pendForm,id:newId,user_id:uid2,gross:parseFloat(pendForm.gross)||null,supplier_pct:parseFloat(pendForm.supplier_pct)||null,supplier_comm_dollar:parseFloat(pendForm.supplier_comm_dollar)||null,agent_split_pct:parseFloat(pendForm.agent_split_pct)||null,expected_amount:parseFloat(amt),year:parseInt(pendForm.year),status:'pending',referral_type:pendForm.referral_type||'standard'})});
    if(!r.ok){showToast('Could not save','err');setPending(prev=>prev.filter(x=>x.id!==newId));return;}
    showToast('Added to pending!');
  }
  async function markReceived(p){
    const newId=crypto.randomUUID();
    const tok=(JSON.parse(localStorage.getItem('pmtp_s')||'null')||{}).access_token||window.PMTP.SUPABASE_KEY;
    setPending(prev=>prev.filter(x=>x.id!==p.id));
    setManual(prev=>[{id:newId,user_id:uid2,client:p.client,supplier:p.supplier,ref:p.ref,paid_date:new Date().toLocaleDateString(),year:p.year,amount:p.expected_amount,notes:(p.notes||'')+' — moved from pending',created_at:new Date().toISOString()},...prev]);
    await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/pending_commissions?id=eq.'+p.id,{method:'DELETE',headers:{'apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok}});
    await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/manual_payments',{method:'POST',headers:{'Content-Type':'application/json','apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},body:JSON.stringify({id:newId,user_id:uid2,client:p.client,supplier:p.supplier,ref:p.ref,paid_date:new Date().toLocaleDateString(),year:p.year,amount:p.expected_amount,notes:(p.notes||'')+' — moved from pending'})});
    showToast('Commission marked received!');
  }
  function startEditPend(p){
    setEditingPend(p.id);
    setEditPendForm({client:p.client||'',supplier:p.supplier||'',ref:p.ref||'',gross:p.gross||'',supplier_pct:p.supplier_pct||'',supplier_comm_dollar:p.supplier_comm_dollar||'',agent_split_pct:p.agent_split_pct||'',expected_amount:p.expected_amount||'',expected_date:p.expected_date||'',year:p.year||new Date().getFullYear(),notes:p.notes||'',referral_type:p.referral_type||'standard'});
    setEditCommInputMode(p.supplier_comm_dollar>0?'dollar':'pct');
  }
  async function saveEditPend(){
    if(!editingPend)return;
    const amt=editPendForm.expected_amount||calcComm(editPendForm);
    try{
      await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/pending_commissions?id=eq.'+editingPend,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},body:JSON.stringify({client:editPendForm.client,supplier:editPendForm.supplier,ref:editPendForm.ref,gross:parseFloat(editPendForm.gross)||null,supplier_pct:parseFloat(editPendForm.supplier_pct)||null,supplier_comm_dollar:parseFloat(editPendForm.supplier_comm_dollar)||null,agent_split_pct:parseFloat(editPendForm.agent_split_pct)||null,expected_amount:parseFloat(amt)||null,expected_date:editPendForm.expected_date||null,year:parseInt(editPendForm.year)||new Date().getFullYear(),notes:editPendForm.notes||null,referral_type:editPendForm.referral_type||'standard'})});
      setEditingPend(null);showToast('Commission updated!');loadData();
    }catch(e){showToast('Could not save','err');}
  }
  async function delPend(id){
    setPending(prev=>prev.filter(x=>x.id!==id));
    const tok=(JSON.parse(localStorage.getItem('pmtp_s')||'null')||{}).access_token||window.PMTP.SUPABASE_KEY;
    await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/pending_commissions?id=eq.'+id,{method:'DELETE',headers:{'apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok}});
  }
  async function moveToPending(p){
    if(!window.confirm('Move this payment back to Pending?'))return;
    const newId=crypto.randomUUID();
    const tok=(JSON.parse(localStorage.getItem('pmtp_s')||'null')||{}).access_token||window.PMTP.SUPABASE_KEY;
    setManual(prev=>prev.filter(x=>x.id!==p.id));
    setPending(prev=>[{id:newId,user_id:uid2,client:p.client||'',supplier:p.supplier||'',ref:p.ref||'',expected_amount:parseFloat(p.amount)||0,year:p.year||new Date().getFullYear(),notes:(p.notes||'')+' — moved from payments',status:'pending',created_at:new Date().toISOString()},...prev]);
    await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/manual_payments?id=eq.'+p.id,{method:'DELETE',headers:{'apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok}});
    await fetch(window.PMTP.SUPABASE_URL+'/rest/v1/pending_commissions',{method:'POST',headers:{'Content-Type':'application/json','apikey':window.PMTP.SUPABASE_KEY,'Authorization':'Bearer '+tok,'Prefer':'return=minimal'},body:JSON.stringify({id:newId,user_id:uid2,client:p.client||'',supplier:p.supplier||'',ref:p.ref||'',expected_amount:parseFloat(p.amount)||0,year:p.year||new Date().getFullYear(),notes:(p.notes||'')+' — moved from payments',status:'pending'})});
    showToast('Moved back to pending!');
  }
  function exportBackup(){
    const data={agentName:session.user.email,exportDate:new Date().toLocaleDateString(),manualPayments:manual,pendingCommissions:pending};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='commissions_backup_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(url);showToast('Backup downloaded!');
  }
  const activePend=pending.filter(p=>p.status==='pending');
  const recPend=pending.filter(p=>p.status==='received');
  const curYear=new Date().getFullYear();
  const yManual=manual.filter(p=>p.year===dashYear);
  const yPend=activePend.filter(p=>(p.year||curYear)===dashYear);
  const allTimeTot=manual.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const pendTot=activePend.reduce((s,p)=>s+(parseFloat(p.expected_amount)||0),0);
  const yTot=yManual.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const yPendTot=yPend.reduce((s,p)=>s+(parseFloat(p.expected_amount)||0),0);
  let filtPay=[...manual];
  if(payYear!=='all')filtPay=filtPay.filter(p=>String(p.year)===payYear);
  if(paySearch){const q=paySearch.toLowerCase();filtPay=filtPay.filter(p=>[p.client,p.supplier,p.ref,p.notes].some(v=>v&&v.toLowerCase().includes(q)));}
  const filtTot=filtPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const C={navy:'#1b2d3a',teal:'#2e8b8b',tealL:'#e0f5f5',gold:'#c9a84c',goldL:'#f5e9c8',green:'#2a7a50',greenL:'#e6f4ed',amber:'#b5730a',amberL:'#fff3d6',red:'#b83232',redL:'#fdecea',cream:'#faf7f2',border:'#ede8df',muted:'#7a6e5f',gray:'#f5f3ef'};
  const inp={width:'100%',padding:'8px 12px',border:'1px solid '+C.border,borderRadius:7,fontSize:12,color:C.navy,background:C.cream,outline:'none',fontFamily:'Georgia,serif'};
  const lbl={fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:4,display:'block',fontFamily:'Georgia,serif'};
  const tabBtn=(t)=>({background:'none',border:'none',borderBottom:'2.5px solid '+(tab===t?C.teal:'transparent'),color:tab===t?C.teal:C.muted,fontFamily:'Georgia,serif',fontSize:12,textTransform:'uppercase',letterSpacing:'0.07em',padding:'10px 18px',cursor:'pointer',transition:'0.15s',marginBottom:-1});
  const priBtn={background:C.navy,border:'none',borderRadius:7,color:C.goldL,fontFamily:'Georgia,serif',fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',padding:'9px 20px',cursor:'pointer'};
  const secBtn={background:C.cream,border:'1px solid '+C.border,borderRadius:7,color:C.navy,fontFamily:'Georgia,serif',fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',padding:'7px 14px',cursor:'pointer'};
  const delBtn={background:C.redL,border:'1px solid rgba(184,50,50,.25)',borderRadius:6,color:C.red,fontSize:11,padding:'3px 8px',cursor:'pointer'};
  const greenBtn={background:C.greenL,border:'1px solid rgba(42,122,80,.3)',color:C.green,borderRadius:6,fontFamily:'Georgia,serif',fontSize:10,textTransform:'uppercase',letterSpacing:'0.05em',padding:'4px 10px',cursor:'pointer'};

  /* ── NEW: Commission Reconciliation button style ── */
  const reconcileBtn={background:'linear-gradient(135deg,#c9a84c,#a88a3a)',border:'none',borderRadius:7,color:'#ffffff',fontFamily:'Georgia,serif',fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',padding:'9px 18px',cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',gap:6};

  const Card=({label,value,color,sub})=>(
    <div style={{background:C.cream,border:'1px solid '+C.border,borderRadius:10,padding:16}}>
      <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6,fontFamily:'Georgia,serif'}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color:color||C.navy,lineHeight:1,fontFamily:'Georgia,serif'}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>{sub}</div>}
    </div>
  );
  if(loading)return<div style={{padding:40,textAlign:'center',color:C.muted}}>Loading commissions...</div>;
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'16px 24px 0',background:C.cream,borderBottom:'1px solid '+C.border,flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div style={{fontSize:10,letterSpacing:'0.16em',color:C.muted,textTransform:'uppercase',marginBottom:3}}>Point Me to Paradise Travel</div>
            <div style={{fontSize:19,fontWeight:700,color:C.navy,fontFamily:'Georgia,serif'}}>💰 My Commissions</div>
          </div>
          {/* ── Action buttons row ── */}
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <button onClick={loadData} style={{...secBtn,fontSize:10,padding:'6px 12px'}}>↻ Refresh</button>
            <button onClick={exportBackup} style={{...secBtn,fontSize:10,padding:'6px 12px'}}>⬇ Back Up</button>
            <span style={{fontSize:11,color:C.muted,fontStyle:'italic',fontFamily:'Georgia,serif'}}>Need to reconcile a commission? Submit a request in <strong style={{color:C.navy}}>Agent Admin Requests</strong> → Commission Reconciliation.</span>
          </div>
        </div>
        <div style={{display:'flex',borderBottom:'1px solid '+C.border}}>
          {['dash','payments','pending'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={tabBtn(t)}>{t==='dash'?'Dashboard':t==='payments'?'Payments':'Pending'}</button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
        {tab==='dash'&&<>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8,fontFamily:'Georgia,serif'}}>Year View</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {YEARS.map(yr=>(<button key={yr} onClick={()=>setDashYear(yr)} style={{padding:'5px 14px',borderRadius:20,fontFamily:'Georgia,serif',fontSize:11,cursor:'pointer',border:'1px solid '+(dashYear===yr?C.teal:C.border),background:dashYear===yr?C.teal:C.cream,color:dashYear===yr?'#fff':C.muted}}>{yr}{yr===curYear?' (now)':''}</button>))}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:20}}>
            <Card label="All-Time Received" value={cur(allTimeTot)} color={C.teal} sub="total paid"/>
            <Card label="All-Time Pending" value={cur(pendTot)} color={C.amber} sub="across all years"/>
            <Card label="All-Time Expected" value={cur(allTimeTot+pendTot)} color={C.navy} sub="received + pending"/>
            <Card label="Total Records" value={manual.length} sub="payments tracked"/>
          </div>
          <div style={{background:C.cream,border:'1px solid '+C.border,borderLeft:'3px solid '+C.teal,borderRadius:10,padding:20,marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:C.navy,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:14,fontFamily:'Georgia,serif'}}>{dashYear}{dashYear<curYear?' Total':dashYear===curYear?' YTD':' Projected'}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
              <Card label="Received" value={cur(yTot)} color={C.teal} sub={yManual.length+' payment'+(yManual.length!==1?'s':'')}/>
              <Card label="Pending" value={cur(yPendTot)} color={C.amber} sub={yPend.length+' expected'}/>
              <Card label="Total Expected" value={cur(yTot+yPendTot)} sub="received + pending"/>
            </div>
          </div>
          {yPend.length>0&&<><div style={{fontSize:12,fontWeight:700,color:C.navy,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:10,fontFamily:'Georgia,serif'}}>Pending — {dashYear}</div>
          <div style={{background:C.cream,border:'1px solid '+C.border,borderRadius:10,overflow:'auto',marginBottom:20}}>

          })()}
          
        </>}
      </div>
    </div>
  );
}

/* ── Calendar / Agenda View ── */
function CalendarView({active,MODS,highlightId,setHighlightId,isOD,isUG,daysTo,fmtDate,getDK,setView,T,btn}){
  const[weekOffset,setWeekOffset]=React.useState(0);
  const[calMode,setCalMode]=React.useState('agenda');
  const allItems=[];
  MODS.filter(m=>!m.external&&m.fields.length>0).forEach(m=>{
    const dk=getDK(m);if(!dk)return;
    active(m.id).forEach(item=>{if(item[dk])allItems.push({item,mod:m,date:item[dk],dk});});
  });
  allItems.sort((a,b)=>a.date.localeCompare(b.date));
  const grouped={};
  allItems.forEach(({item,mod,date,dk})=>{if(!grouped[date])grouped[date]=[];grouped[date].push({item,mod,dk});});
  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);
  const modColor=(mod)=>{const colors={hpTrips:T.red,hpFollowups:T.orange,finalPayments:T.gold,obc:T.teal,components:'#2e8b8b',itineraries:T.goldLight,newInquiries:'#7b68ee',softFollowups:T.teal,agentRequests:'#9b59b6',hotelRequests:'#e67e22',supplierInteractions:'#8e44ad',admin:T.green};return colors[mod.id]||T.navy;};
  const getWeekDays=()=>{const days=[];const start=new Date(today);start.setDate(start.getDate()+weekOffset*7-start.getDay());for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);days.push(d);}return days;};
  const dateToStr=d=>d.toISOString().slice(0,10);
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const overdue=Object.entries(grouped).filter(([d])=>d<todayStr).sort((a,b)=>b[0].localeCompare(a[0]));
  const upcoming=Object.entries(grouped).filter(([d])=>d>=todayStr);
  const DayItem=({item,mod,dk})=>{
    const od=isOD(item,mod),ug=isUG(item,mod);
    const f0=mod.fields[0];
    const aF=mod.fields.find(f=>['action','reason','components','task','need','subject'].includes(f.k));
    const color=modColor(mod);
    return(<div onClick={()=>{setView(mod.id);setHighlightId(item.id);setTimeout(()=>setHighlightId(null),2500);}} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'6px 10px',borderRadius:6,background:od?T.redPale:T.white,border:'1px solid '+(od?T.red:ug?color:'#ede8df'),cursor:'pointer',marginBottom:4}}>
      <div style={{width:3,borderRadius:2,alignSelf:'stretch',background:color,flexShrink:0,minHeight:24}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontSize:9,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:T.white,background:color,padding:'1px 5px',borderRadius:3,flexShrink:0}}>{mod.icon} {mod.nav||mod.label}</span>{od&&<span style={{fontSize:9,fontWeight:700,color:T.red,textTransform:'uppercase'}}>OVERDUE</span>}</div>
        <div style={{fontWeight:700,fontSize:12,color:T.navy,marginTop:2}}>{item[f0.k]||'—'}</div>
        {aF&&item[aF.k]&&<div style={{fontSize:11,color:T.textSec,lineHeight:1.4}}>{item[aF.k].slice(0,60)}{item[aF.k].length>60?'...':''}</div>}
      </div>
    </div>);
  };
  const weekDays=getWeekDays();
  return(
    <div style={{padding:'20px 26px',overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:13}}>
          <div style={{width:4,height:38,background:'linear-gradient(to bottom,#2e8b8b,'+T.teal+')',borderRadius:2}}/>
          <div><div style={{fontSize:10,letterSpacing:'0.16em',color:T.textSec,textTransform:'uppercase',marginBottom:3}}>{allItems.length} dated items</div><div style={{fontSize:19,fontWeight:700,color:T.navy,letterSpacing:'0.04em'}}>📅 Calendar / Agenda</div></div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setCalMode('agenda')} style={{...btn,padding:'6px 14px',fontSize:10,background:calMode==='agenda'?'linear-gradient(135deg,'+T.navy+','+T.navyMid+')':'transparent',border:'1px solid '+(calMode==='agenda'?T.gold:T.border),color:calMode==='agenda'?T.goldLight:T.textSec}}>📋 Agenda</button>
          <button onClick={()=>setCalMode('week')} style={{...btn,padding:'6px 14px',fontSize:10,background:calMode==='week'?'linear-gradient(135deg,'+T.navy+','+T.navyMid+')':'transparent',border:'1px solid '+(calMode==='week'?T.gold:T.border),color:calMode==='week'?T.goldLight:T.textSec}}>📅 Week</button>
        </div>
      </div>
      {calMode==='agenda'&&<>
        {overdue.length>0&&<><div style={{fontSize:10,letterSpacing:'0.14em',color:T.red,textTransform:'uppercase',fontWeight:700,marginBottom:8,display:'flex',alignItems:'center',gap:6}}><span style={{width:8,height:8,borderRadius:'50%',background:T.red,display:'inline-block'}}/>Overdue ({overdue.reduce((s,[,items])=>s+items.length,0)} items)</div>
        {overdue.map(([date,items])=>(<div key={date} style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:T.red,marginBottom:4,letterSpacing:'0.06em'}}>{new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · {Math.abs(daysTo(date))}d overdue</div>{items.map(({item,mod,dk},i)=><DayItem key={i} item={item} mod={mod} dk={dk}/>)}</div>))}
        <div style={{height:1,background:T.border,margin:'16px 0'}}/></>}
        {upcoming.length===0?<div style={{textAlign:'center',padding:'40px 0',color:T.textSub,fontSize:13}}>No upcoming dated items.</div>:
        upcoming.map(([date,items])=>{
          const d=daysTo(date),isToday=date===todayStr,isTomorrow=d===1;
          const label=isToday?'TODAY':isTomorrow?'TOMORROW':new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
          const subLabel=isToday?'':isTomorrow?'':d<=7?d+'d away':'';
          return(<div key={date} style={{marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}><div style={{fontSize:12,fontWeight:700,color:isToday?T.red:isTomorrow?T.orange:T.navy,letterSpacing:'0.06em',textTransform:'uppercase'}}>{label}</div>{subLabel&&<div style={{fontSize:10,color:T.textSub}}>{subLabel}</div>}{isToday&&<div style={{width:6,height:6,borderRadius:'50%',background:T.red,animation:'pulse 2s infinite'}}/>}</div>
            {items.map(({item,mod,dk},i)=><DayItem key={i} item={item} mod={mod} dk={dk}/>)}
          </div>);
        })}
      </>}
      {calMode==='week'&&<>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <button onClick={()=>setWeekOffset(v=>v-1)} style={{...btn,padding:'6px 12px',fontSize:12,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>← Prev</button>
          <div style={{fontSize:12,fontWeight:700,color:T.navy,letterSpacing:'0.06em'}}>{monthNames[weekDays[0].getMonth()]} {weekDays[0].getDate()} – {monthNames[weekDays[6].getMonth()]} {weekDays[6].getDate()}, {weekDays[6].getFullYear()}</div>
          <button onClick={()=>setWeekOffset(v=>v+1)} style={{...btn,padding:'6px 12px',fontSize:12,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>Next →</button>
        </div>
        {weekOffset!==0&&<button onClick={()=>setWeekOffset(0)} style={{...btn,padding:'4px 10px',fontSize:10,background:'transparent',border:'1px solid '+T.border,color:T.textSec,marginBottom:12}}>↩ Back to Today</button>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}}>
          {weekDays.map((day,i)=>{
            const dStr=dateToStr(day),isToday=dStr===todayStr,dayItems=grouped[dStr]||[];
            return(<div key={i} style={{minHeight:120,background:isToday?'#f0f9f9':T.white,border:'1.5px solid '+(isToday?'#2e8b8b':T.border),borderRadius:8,padding:'6px',overflow:'hidden'}}>
              <div style={{fontSize:10,fontWeight:700,color:isToday?'#2e8b8b':T.textSec,textTransform:'uppercase',marginBottom:4,textAlign:'center'}}>{dayNames[day.getDay()]}<div style={{fontSize:16,fontWeight:700,color:isToday?'#2e8b8b':T.navy,lineHeight:1}}>{day.getDate()}</div></div>
              {dayItems.map(({item,mod},j)=>{
                const f0=mod.fields[0],color=modColor(mod),od=isOD(item,mod);
                return(<div key={j} onClick={()=>{setView(mod.id);setHighlightId(item.id);setTimeout(()=>setHighlightId(null),2500);}} style={{background:od?T.redPale:color+'22',border:'1px solid '+(od?T.red:color),borderLeft:'3px solid '+(od?T.red:color),borderRadius:4,padding:'3px 5px',marginBottom:3,cursor:'pointer',overflow:'hidden'}}>
                  <div style={{fontSize:9,fontWeight:700,color:od?T.red:color,textTransform:'uppercase',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{mod.icon} {mod.nav}</div>
                  <div style={{fontSize:10,fontWeight:700,color:T.navy,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item[f0.k]}</div>
                </div>);
              })}
            </div>);
          })}
        </div>
      </>}
      <div style={{marginTop:20,padding:'12px 14px',background:T.white,border:'1px solid '+T.border,borderRadius:8}}>
        <div style={{fontSize:9,letterSpacing:'0.14em',color:T.textSub,textTransform:'uppercase',marginBottom:8}}>Module Legend</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {MODS.filter(m=>!m.external&&m.fields.length>0&&getDK(m)).map(m=>(<span key={m.id} style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:modColor(m)+'22',color:modColor(m),border:'1px solid '+modColor(m)+'44',fontWeight:700}}>{m.icon} {m.nav}</span>))}
        </div>
      </div>
    </div>
  );
}

  const[googleTok,setGoogleTok]=useState(()=>{const tok=localStorage.getItem('pmtp_gtok');const exp=parseInt(localStorage.getItem('pmtp_gexp')||'0');return tok&&Date.now()<exp?tok:null;});
  const[calLoad,setCalLoad]=useState(null);
  const showToast=useCallback((msg,type='ok')=>setToast({msg,type}),[]);
  const[chatNotif,setChatNotif]=React.useState(null);
  const[chatUnreadCount,setChatUnreadCount]=React.useState(0);
  const[referralCount,setReferralCount]=React.useState(0);
  const[coworkCount,setCoworkCount]=React.useState(0);
  const[coworkTaskCount,setCoworkTaskCount]=React.useState(0);
  const[reqCount,setReqCount]=React.useState(0);
  const[fitPayDueCount,setFitPayDueCount]=React.useState(0);
  const[staffReqCount,setStaffReqCount]=React.useState(0);
  const[adminCoworkCount,setAdminCoworkCount]=React.useState(0);
  const[fitPaidCount,setFitPaidCount]=React.useState(0);
  const[fitPayComps,setFitPayComps]=React.useState([]);
  const[coworkWaitingCount,setCoworkWaitingCount]=React.useState(0);
  const[coworkUnreadCount,setCoworkUnreadCount]=React.useState(0);
  const lastChatCheck=React.useRef(new Date().toISOString());
  const agentNameForChat=(session?.user?.user_metadata?.full_name||session?.user?.email||'');
  React.useEffect(()=>{
    if(!session||!agentNameForChat)return;
    // On load: count existing unread messages
    (async()=>{
      try{
        const r=await fetch(CHAT_SB_URL+'/rest/v1/team_chat?select=id,channel,recipient_name,read_by,sender_name&or=(channel.eq.general,and(channel.eq.dm,recipient_name.eq.'+encodeURIComponent(agentNameForChat)+'))&sender_name=neq.'+encodeURIComponent(agentNameForChat),{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
        const msgs=await r.json();
        if(msgs&&msgs.length){
          const unread=msgs.filter(m=>!m.read_by||!m.read_by.includes(agentNameForChat));
          if(unread.length>0)setChatUnreadCount(unread.length);
        }
      }catch(e){}
    })();
  },[session,agentNameForChat]);
  async function fetchFitPayData(name){
    try{
      const FIT_ADMINS=['Christina Garcia','Tabitha Garcia'];
      const isFitAdmin=FIT_ADMINS.includes(name)||FIT_ADMINS.some(n=>name&&n.toLowerCase().includes(name.toLowerCase().split(' ')[0]));
      if(!isFitAdmin)return;
      const fitCompRes=await fetch(CHAT_SB_URL+'/rest/v1/fit_components?ready_to_pay=eq.true&paid=eq.false&select=id,vendor,cost,markup,stripe_fees,vendor_commission,trip_id,scheduled,scheduled_at,due_date&order=ready_at.asc',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
      const fitCompData=await fitCompRes.json();
      if(Array.isArray(fitCompData)){
        setFitPayDueCount(fitCompData.length);
        const tripIds=[...new Set(fitCompData.map(c=>c.trip_id))];
        if(tripIds.length>0){
          const trRes=await fetch(CHAT_SB_URL+'/rest/v1/fit_trips?id=in.('+tripIds.join(',')+')'+'&select=id,client,trip_name,agent_name',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
          const trData=await trRes.json();
          if(Array.isArray(trData)){
            const tripMap={};trData.forEach(t=>{tripMap[t.id]=t;});
            setFitPayComps(fitCompData.map(c=>({...c,trip:tripMap[c.trip_id]})).filter(c=>c.trip));
          }
        } else {setFitPayComps([]);}
      }
    }catch(e){}
  }
  React.useEffect(()=>{
    if(!session||!agentNameForChat)return;
    fetchFitPayData(agentNameForChat);
  },[session,agentNameForChat]);
  React.useEffect(()=>{
    if(!session)return;
    const poll=setInterval(async()=>{
      try{
        const since=lastChatCheck.current;lastChatCheck.current=new Date().toISOString();
        const r=await fetch(CHAT_SB_URL+'/rest/v1/team_chat?created_at=gt.'+encodeURIComponent(since)+'&sender_name=neq.'+encodeURIComponent(agentNameForChat)+'&select=sender_name,message,channel,recipient_name',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
        const msgs=await r.json();
        if(msgs&&msgs.length>0){
          const relevant=msgs.filter(m=>m.channel==='general'||(m.channel==='dm'&&m.recipient_name===agentNameForChat));
          if(relevant.length>0){
            const m=relevant[relevant.length-1];
            setChatNotif({sender:m.sender_name,text:m.message.slice(0,60)+(m.message.length>60?'...':''),isDm:m.channel==='dm'});
            setTimeout(()=>setChatNotif(null),5000);
            if(view!=='chat')setChatUnreadCount(c=>c+relevant.length);
          }
        }
      }catch(e){}
    },8000);
    return()=>clearInterval(poll);
  },[session]);
  React.useEffect(()=>{
    if(!session||!agentNameForChat)return;
    async function updatePresenceApp(){
      try{await fetch(CHAT_SB_URL+'/rest/v1/agent_presence',{method:'POST',headers:{'Content-Type':'application/json','apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({agent_name:agentNameForChat,last_seen:new Date().toISOString()})});}catch(e){}
    }
    updatePresenceApp();
    const presencePoll=setInterval(updatePresenceApp,20000);
    return()=>clearInterval(presencePoll);
  },[session,agentNameForChat]);
  React.useEffect(()=>{
    if(!session||!agentNameForChat)return;
    const refPoll=setInterval(async()=>{
      try{
        const r=await fetch(CHAT_SB_URL+'/rest/v1/agent_referrals?to_agent=eq.'+encodeURIComponent(agentNameForChat)+'&status=eq.new&select=id',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
        const data=await r.json();
        if(Array.isArray(data))setReferralCount(data.length);
        const cr=await fetch(CHAT_SB_URL+'/rest/v1/cowork_trips?status=eq.pending&select=id,assisting_agents',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
        const cdata=await cr.json();
        if(Array.isArray(cdata))setCoworkCount(cdata.filter(t=>t.assisting_agents&&t.assisting_agents.includes(agentNameForChat)).length);
        const tr=await fetch(CHAT_SB_URL+'/rest/v1/cowork_tasks?assigned_to=eq.'+encodeURIComponent(agentNameForChat)+'&status=eq.pending&select=id,description,due_date,trip_id',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
        const tdata=await tr.json();
        if(Array.isArray(tdata)){
          const newCount=tdata.length;
          if(newCount>coworkTaskCount&&newCount>0){
            setChatNotif({sender:'New Task',text:tdata[0].description?.slice(0,60)||'Task assigned to you',isDm:false,isTask:true});
            setTimeout(()=>setChatNotif(null),6000);
          }
          setCoworkTaskCount(newCount);
        }
        // Waiting on others count
        try{
          const wr=await fetch(CHAT_SB_URL+'/rest/v1/cowork_tasks?created_by=eq.'+encodeURIComponent(agentNameForChat)+'&status=in.(pending,acknowledged,in_progress)&select=id',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
          const wdata=await wr.json();
          if(Array.isArray(wdata))setCoworkWaitingCount(wdata.length);
          const rr=await fetch(CHAT_SB_URL+'/rest/v1/agent_requests?accepting_agent=eq.'+encodeURIComponent(agentNameForChat)+'&status=eq.pending&select=id',{headers:{'apikey':CHAT_SB_KEY,'Authorization':'Bearer '+CHAT_SB_KEY}});
          const rdata=await rr.json();
          if(Array.isArray(rdata))setReqCount(rdata.length);
          // FIT Trip Payments Due polling
          fetchFitPayData(agentName);
          if(false){
            // Non-admins: get their own trip IDs first, then check for recently paid components

          <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
            {confirm.onDelete&&<button onClick={confirm.onDelete} style={{...btn,padding:'9px 20px',background:'transparent',border:'1px solid #fcc',color:T.red,fontSize:12}}>{confirm.deleteLabel||'🗑 Delete'}</button>}
            <button onClick={confirm.onConfirm} style={{...btn,padding:'9px 24px',background:confirm.onDelete?T.green:T.red,color:T.white,fontSize:12}}>{confirm.confirmLabel||'Confirm'}</button>
            <button onClick={()=>setConfirm(null)} style={{...btn,padding:'9px 24px',background:'transparent',border:'1px solid '+T.border,color:T.textSec,fontSize:12}}>Cancel</button>
          </div>
        </div>
      </div>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      {chatNotif&&<div onClick={()=>{if(chatNotif.isTask)setView('cowork');else setView('chat');setChatNotif(null);}} style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:9999,background:'#1b2d3a',border:'1px solid '+(chatNotif.isTask?'#7b5ea7':'#2e8b8b'),borderRadius:12,padding:'12px 20px',boxShadow:'0 8px 32px rgba(0,0,0,0.25)',cursor:'pointer',display:'flex',gap:10,alignItems:'center',minWidth:260,maxWidth:360}}>
        <div style={{width:36,height:36,borderRadius:'50%',background:chatNotif.isTask?'#f0ecf8':'#e8f5f5',border:'1px solid '+(chatNotif.isTask?'#7b5ea7':'#2e8b8b'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{chatNotif.isTask?'✅':'💬'}</div>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'#e2c97e',letterSpacing:'0.06em',textTransform:'uppercase'}}>{chatNotif.isDm?'Direct Message':'#general'} · {chatNotif.sender}</div>
          <div style={{fontSize:12,color:'#fff',marginTop:2,lineHeight:1.4}}>{chatNotif.text}</div>
        </div>
        <button onClick={e=>{e.stopPropagation();setChatNotif(null);}} style={{background:'none',border:'none',color:'#9ab0bb',cursor:'pointer',fontSize:16,marginLeft:'auto',padding:0}}>×</button>
      </div>}
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
